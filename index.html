                    await signInWithPopup(auth, provider);
                } catch (e) {
                    console.error(e);
                    alert("Login failed: " + e.message);
                }
            };

            const handleLogout = () => signOut(auth);

            // 1. Auth Listener
            useEffect(() => {
                if (!auth) {
                    setError("Firebase config missing");
                    setAuthLoading(false);
                    return;
                }
                const unsubscribe = onAuthStateChanged(auth, u => {
                    setUser(u);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. Data Listener (Depends on User & Limit)
            useEffect(() => {
                if (!user) {
                    setLogs([]);
                    return;
                }

                setLoading(true);
                let q = query(
                    collection(db, 'artifacts', 'workpulse-365', 'users', user.uid, 'worklogs'),
                    orderBy('date', 'desc')
                );

                if (queryLimit) {
                    q = query(q, limit(queryLimit));
                }

                const unsubLogs = onSnapshot(q, s => {
                    const logsData = s.docs.map(doc => {
                        const data = doc.data();

                        // Safety Helpers
                        const convertDate = (val) => {
                            if (!val) return null;
                            if (val && typeof val.toDate === 'function') return val.toDate().toISOString();
                            if (val instanceof Date) return val.toISOString();
                            return val;
                        };
                        const safeString = (str, def = '') => {
                            if (typeof str === 'string') return str;
                            if (typeof str === 'number') return String(str);
                            return def;
                        };

                        return {
                            id: doc.id,
                            ...data,
                            title: safeString(data.title, 'Untitled'),
                            category: safeString(data.category, 'General'),
                            application: safeString(data.application),
                            priority: safeString(data.priority, 'P3'),
                            customer: safeString(data.customer),
                            impact: safeString(data.impact),
                            // Dates
                            createdAt: convertDate(data.createdAt),
                            date: convertDate(data.date) || new Date().toISOString(),
                            lastUpdateDate: convertDate(data.lastUpdateDate)
                        };
                    });
                    setLogs(logsData);
                    setLoading(false);
                });
                return () => unsubLogs();
            }, [user, queryLimit]);

            const handleAdd = async (data) => {
                if (user) await addDoc(collection(db, 'artifacts', 'workpulse-365', 'users', user.uid, 'worklogs'), { ...data, userId: user.uid });
            };

            const handleUpdate = async (id, data) => {
                if (user) await updateDoc(doc(db, 'artifacts', 'workpulse-365', 'users', user.uid, 'worklogs', id), data);
            };

            const handleDelete = async (id) => {
                if (user) await deleteDoc(doc(db, 'artifacts', 'workpulse-365', 'users', user.uid, 'worklogs', id));
            };

            const upcomingLogs = useMemo(() => {
                return logs.filter(l => ['P1', 'P2', 'P3'].includes(l.priority) && l.status !== 'Done').sort((a, b) => a.priority.localeCompare(b.priority));
            }, [logs]);

            if (authLoading) {
                return <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50"><Loader2 className="animate-spin text-dhl-red mb-4" size={48} /><p className="text-slate-400 text-sm font-bold animate-pulse">Loading WorkPulse...</p></div>;
            }

            // Login Screen if no user
            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-100 flex flex-col">
                        <Header user={null} />
                        <div className="flex-1 flex flex-col items-center justify-center p-6 animate-in fade-in slide-in-from-bottom-8 duration-700">
                            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center space-y-8 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-dhl-yellow"></div>
                                <div className="w-24 h-24 bg-gradient-to-br from-dhl-yellow to-yellow-400 rounded-full mx-auto flex items-center justify-center text-dhl-red shadow-lg transform -rotate-3 hover:rotate-3 transition-transform duration-500">
                                    <Award size={48} />
                                </div>
                                <div>
                                    <h2 className="text-3xl font-black text-slate-800 mb-3 tracking-tight">Welcome Back!</h2>
                                    <p className="text-slate-500 leading-relaxed text-sm">Sign in to track your work, generate reports, and boost productivity with DHL WorkPulse.</p>
                                </div>
                                <button onClick={handleLogin} className="w-full bg-white border-2 border-slate-200 hover:border-dhl-red hover:bg-red-50 text-slate-700 font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all group shadow-sm hover:shadow-md">
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6" alt="Google" />
                                    <span className="group-hover:text-dhl-red text-lg">Sign in with Google</span>
                                </button>
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Secure Login via Google</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // View Components to keep main return clean
            const NavButtons = ({ vertical = false }) => (
                <>
                    <button onClick={() => setActiveTab('home')} className={`flex ${vertical ? 'flex-row gap-3 px-4 py-3 w-full hover:bg-slate-100' : 'flex-col justify-center w-full p-2'} items-center rounded-lg transition-all ${activeTab === 'home' ? 'text-dhl-red bg-red-50/50' : 'text-slate-400'}`}>
                        <Menu size={24} /> <span className={`font-bold ${vertical ? 'text-sm' : 'text-xs mt-1'}`}>Home</span>
                    </button>
                    <button onClick={() => setActiveTab('timeline')} className={`flex ${vertical ? 'flex-row gap-3 px-4 py-3 w-full hover:bg-slate-100' : 'flex-col justify-center w-full p-2'} items-center rounded-lg transition-all ${activeTab === 'timeline' ? 'text-dhl-red bg-red-50/50' : 'text-slate-400'}`}>
                        <LayoutList size={24} /> <span className={`font-bold ${vertical ? 'text-sm' : 'text-xs mt-1'}`}>Timeline</span>
                    </button>
                    <button onClick={() => setActiveTab('stats')} className={`flex ${vertical ? 'flex-row gap-3 px-4 py-3 w-full hover:bg-slate-100' : 'flex-col justify-center w-full p-2'} items-center rounded-lg transition-all ${activeTab === 'stats' ? 'text-dhl-red bg-red-50/50' : 'text-slate-400'}`}>
                        <ChartIcon size={24} /> <span className={`font-bold ${vertical ? 'text-sm' : 'text-xs mt-1'}`}>Dashboard</span>
                    </button>
                </>
            );

            // Main App
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <Header user={user} onLogout={handleLogout} onSettings={() => setActiveTab('settings')} />

                    <div className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 pb-24 md:pb-6">

                        {/* Desktop Layout Grid */}
                        <div className="md:grid md:grid-cols-[240px_1fr] gap-8 items-start h-full">

                            {/* Desktop Sidebar */}
                            <aside className="hidden md:block bg-white rounded-xl shadow-sm border border-slate-100 p-4 sticky top-24">
                                <nav className="space-y-2">
                                    <div className="px-4 py-2 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Menu</div>
                                    <NavButtons vertical={true} />
                                </nav>
                                <div className="mt-8 border-t pt-4 px-4">
                                    <div className="text-xs text-slate-400">
                                        Logged in as <br /> <b className="text-slate-600">{user.displayName}</b>
                                    </div>
                                </div>
                            </aside>

                            {/* Main Content Area */}
                            <main className="w-full">
                                {loading && <div className="text-center py-20"><Loader2 className="animate-spin mx-auto text-dhl-red" size={32} /><p className="text-slate-400 mt-2 text-sm">Syncing...</p></div>}

                                {!loading && error && (
                                    <div className="bg-red-50 text-red-800 p-4 rounded-xl border border-red-100 mb-6 flex items-center gap-3">
                                        <div className="bg-red-100 p-2 rounded-full"><LogOut size={16} /></div>
                                        <div><b>Connection Error:</b> {error}</div>
                                    </div>
                                )}

                                {!loading && !error && (
                                    <div className="animate-in fade-in slide-in-from-bottom-2 duration-500">
                                        {activeTab === 'home' && (
                                            <div className="lg:grid lg:grid-cols-12 gap-8 items-start">
                                                {/* Left Col: Quick Log */}
                                                <div className="lg:col-span-5 xl:col-span-4 lg:sticky lg:top-24 relative z-20 mb-8 lg:mb-0">
                                                    <QuickLog onAddLog={handleAdd} />
                                                </div>

                                                {/* Right Col: Timeline/Tasks */}
                                                <div className="lg:col-span-7 xl:col-span-8 relative z-10">
                                                    <div className="flex items-center justify-between mb-6">
                                                        <div className="flex items-center gap-3">
                                                            <div className="p-2 bg-red-100 rounded-lg text-dhl-red"><TrendingUp size={20} /></div>
                                                            <div>
                                                                <h3 className="text-xl font-bold text-slate-800 leading-none">Upcoming & Critical</h3>
                                                                <p className="text-xs text-slate-500 font-medium mt-1">High priority tasks needing attention</p>
                                                            </div>
                                                        </div>
                                                        <span className="bg-dhl-red text-white px-3 py-1 rounded-full text-sm font-bold shadow-sm">{upcomingLogs.length}</span>
                                                    </div>

                                                    <div className="space-y-4">
                                                        {upcomingLogs.length === 0 ?
                                                            <div className="bg-white rounded-xl p-8 text-center border border-slate-100 border-dashed">
                                                                <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3 text-slate-300">
                                                                    <CheckCircle size={32} />
                                                                </div>
                                                                <p className="text-slate-500 font-medium">No critical tasks pending.</p>
                                                                <p className="text-xs text-slate-400">Enjoy your coffee! ☕</p>
                                                            </div>
                                                            :
                                                            upcomingLogs.map(log => <LogCard key={log.id} log={log} onDelete={handleDelete} onUpdate={handleUpdate} />)
                                                        }
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        {activeTab === 'timeline' && <Timeline logs={logs} onDelete={handleDelete} onUpdate={handleUpdate} queryLimit={queryLimit} onLoadAll={() => setQueryLimit(null)} />}
                                        {activeTab === 'stats' && (
                                            <>
                                                {queryLimit && (
                                                    <div onClick={() => setQueryLimit(null)} className="bg-yellow-50 border border-yellow-200 p-2 mb-4 rounded-lg text-center cursor-pointer hover:bg-yellow-100 transition-colors">
                                                        <p className="text-xs text-yellow-700 font-bold flex items-center justify-center gap-2">
                                                            <TrendingUp size={14} /> Stats based on recent {queryLimit} items. Click to Load All.
                                                        </p>
                                                    </div>
                                                )}
                                                <Dashboard logs={logs} />
                                            </>
                                        )}
                                        {activeTab === 'settings' && <AppSettings />}
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>

                    {/* Mobile Bottom Nav */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-40 pb-safe">
                        <div className="flex justify-around p-2">
                            <NavButtons vertical={false} />
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
