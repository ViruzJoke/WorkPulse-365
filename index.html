<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkPulse 365 (Portable)</title>

    <!-- 1. Tailwind CSS (Client-side version for development/portable use) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dhl: {
                            yellow: '#FFCC00',
                            red: '#D40511',
                        }
                    },
                    fontFamily: {
                        sans: ['Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- 2. Babel for JSX Support -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <!-- 3. Import Map for Packages -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0",
            "recharts": "https://esm.sh/recharts@2.10.3?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
</head>

<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <!-- 4. Application Logic -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import ReactDOM from 'react-dom/client';
        import { Menu, Send, PlusCircle, Trash2, Edit2, Calendar, LayoutList, PieChart as ChartIcon, Award, TrendingUp, Loader2, Share2, CheckCircle, MessageSquare, LogOut, User, X, Settings } from 'lucide-react';
        import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as ReTooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } from 'recharts';

        // --- Firebase Imports (Direct from Google CDN for Module) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, updateDoc, doc, limit, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyDeKCmhY0NN2VA0yHqQS9Jr4lBIi5AAJg4",
            authDomain: "workpulse-365.firebaseapp.com",
            projectId: "workpulse-365",
            storageBucket: "workpulse-365.firebasestorage.app",
            messagingSenderId: "289186802306",
            appId: "1:289186802306:web:b3005140e698c35e01629b"
        };

        // Initialize Firebase safely
        let auth, db;
        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            // Enable Offline Persistence
            enableIndexedDbPersistence(db, { forceOwnership: false }).catch((err) => {
                if (err.code == 'failed-precondition') {
                    console.warn("Persistence failed: Multiple tabs open");
                } else if (err.code == 'unimplemented') {
                    console.warn("Persistence not supported");
                }
            });
        } catch (err) {
            console.error("Firebase Init Error:", err);
        }

        // --- Components ---

        const Header = ({ user, onLogout, onSettings }) => (
            <header className="bg-dhl-yellow shadow-md sticky top-0 z-50">
                <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                    <div className="flex items-center space-x-3">
                        <div className="bg-dhl-red text-white p-1 rounded transform -skew-x-12 shadow-sm">
                            <h1 className="font-black italic text-2xl tracking-tighter px-1">DHL</h1>
                        </div>
                        <span className="text-dhl-red font-bold text-xl hidden sm:block">WorkPulse 365</span>
                        <span className="text-dhl-red font-bold text-xl sm:hidden">WP365</span>
                    </div>
                    {user && (
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-2 mr-1">
                                {user.photoURL ? (
                                    <img src={user.photoURL} alt="Profile" className="w-9 h-9 rounded-full border-2 border-white shadow-sm" />
                                ) : (
                                    <div className="w-9 h-9 rounded-full bg-white text-dhl-red border-2 border-dhl-red flex items-center justify-center font-bold shadow-sm">
                                        {user.displayName ? user.displayName[0].toUpperCase() : <User size={18} />}
                                    </div>
                                )}
                                <span className="hidden md:block font-bold text-dhl-red text-sm">{user.displayName}</span>
                            </div>
                            <button onClick={onSettings} className="bg-white/20 text-dhl-red hover:bg-white/40 p-2 rounded-full transition-colors" title="Settings">
                                <Settings size={18} />
                            </button>
                            <button onClick={onLogout} className="bg-white/20 text-dhl-red hover:bg-white/40 p-2 rounded-full transition-colors" title="Logout">
                                <LogOut size={18} />
                            </button>
                        </div>
                    )}
                </div>
            </header>
        );

        // --- Constants ---
        const PRIORITIES = {
            'P1': { label: 'P1 - Critical (1 Day)', color: 'bg-red-600 text-white', days: 1 },
            'P2': { label: 'P2 - High (3 Days)', color: 'bg-orange-500 text-white', days: 3 },
            'P3': { label: 'P3 - Medium (5 Days)', color: 'bg-yellow-500 text-white', days: 5 },
            'P4': { label: 'P4 - Low (10 Days)', color: 'bg-blue-500 text-white', days: 10 },
            'P5': { label: 'P5 - Trivial (30 Days)', color: 'bg-slate-400 text-white', days: 30 }
        };

        // Helper: Add Business Days (Skip Sat/Sun)
        // Rule: If we need to add 1 day to Friday, we arrive at Monday.
        const addBusinessDays = (dateStr, days) => {
            const start = dateStr ? new Date(dateStr) : new Date();
            if (isNaN(start.getTime())) return new Date();

            let current = new Date(start.valueOf());
            let added = 0;
            // Safety break to prevent infinite loops
            let safety = 0;

            while (added < days && safety < 365) {
                current.setDate(current.getDate() + 1);
                const day = current.getDay();
                // 0 = Sunday, 6 = Saturday. Skip these.
                if (day !== 0 && day !== 6) {
                    added++;
                }
                safety++;
            }
            return current;
        };

        // Helper: Get Business Days Remaining
        // Calculates working days between Now and Target.
        const getBusinessDaysLeft = (targetDate) => {
            if (!targetDate || isNaN(targetDate.getTime())) return 0;

            const start = new Date();
            start.setHours(0, 0, 0, 0); // Normalized Today

            const end = new Date(targetDate);
            end.setHours(0, 0, 0, 0); // Normalized Target

            // If same day
            if (start.getTime() === end.getTime()) return 0;

            // Determine direction and swap if needed for simple counting
            const isOverdue = start > end;
            let from = isOverdue ? end : start;
            let to = isOverdue ? start : end;

            let count = 0;
            let ptr = new Date(from.valueOf());
            let safety = 0;

            while (ptr < to && safety < 1000) {
                ptr.setDate(ptr.getDate() + 1);
                const day = ptr.getDay();
                if (day !== 0 && day !== 6) {
                    count++;
                }
                safety++;
            }

            return isOverdue ? -count : count;
        };

        const CATEGORY_MAPPING = {
            'Standard': ['MyDHL+', 'Proview', 'Other'],
            'Integration': ['MyDHL API', 'DCG', 'eAlert', 'DEC', 'Other'],
            'Project': ['Access', 'Excel', 'Meeting', 'Other']
        };

        const ALL_APPS = ['All', ...new Set(Object.values(CATEGORY_MAPPING).flat())];

        const QuickLog = ({ onAddLog }) => {
            const [title, setTitle] = useState('');
            // Load defaults or fallback
            const [category, setCategory] = useState(() => localStorage.getItem('default_category') || Object.keys(CATEGORY_MAPPING)[0]);
            const [application, setApplication] = useState(() => {
                const startCat = localStorage.getItem('default_category') || Object.keys(CATEGORY_MAPPING)[0];
                return CATEGORY_MAPPING[startCat] ? CATEGORY_MAPPING[startCat][0] : 'MyDHL+';
            });
            const [priority, setPriority] = useState(() => localStorage.getItem('default_priority') || 'P3');

            const [customer, setCustomer] = useState('');
            const [targetMonth, setTargetMonth] = useState('');
            const [impact, setImpact] = useState('');
            const [isExpanded, setIsExpanded] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleCategoryChange = (e) => {
                const newCat = e.target.value;
                setCategory(newCat);
                setApplication(CATEGORY_MAPPING[newCat][0]);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!title.trim()) return;
                setLoading(true);
                await onAddLog({
                    title, category, application, priority, customer, targetMonth, impact,
                    date: new Date().toISOString().split('T')[0],
                    createdAt: new Date()
                });
                setLoading(false);
                setTitle(''); setCustomer(''); setImpact(''); setIsExpanded(false);
            };

            return (
                <div className="bg-white rounded-xl shadow-lg p-4 mb-6 border-l-4 border-dhl-red">
                    <div className="flex items-center justify-between mb-2">
                        <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <PlusCircle className="text-dhl-red" size={20} /> Quick Log
                        </h2>
                        <button onClick={() => setIsExpanded(!isExpanded)} className="text-sm text-slate-500 hover:text-dhl-red">
                            {isExpanded ? 'Collapse' : 'Expand'}
                        </button>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-3">
                        <div className="space-y-2">
                            <input
                                type="text" placeholder="What did you achieve today?"
                                className="w-full p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-dhl-yellow outline-none font-medium"
                                value={title} onChange={e => setTitle(e.target.value)} disabled={loading}
                            />
                            <div className="flex gap-2">
                                <select
                                    value={category} onChange={handleCategoryChange}
                                    className="flex-1 p-2 bg-slate-100 border rounded-lg text-sm font-medium outline-none focus:ring-2 focus:ring-dhl-yellow">
                                    {Object.keys(CATEGORY_MAPPING).map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <select
                                    value={priority} onChange={e => setPriority(e.target.value)}
                                    className={`w-24 p-2 border rounded-lg text-sm font-bold outline-none focus:ring-2 focus:ring-dhl-yellow ${PRIORITIES[priority].color}`}>
                                    {Object.keys(PRIORITIES).map(p => <option key={p} value={p} className="bg-white text-slate-800">{p}</option>)}
                                </select>
                            </div>
                        </div>

                        {isExpanded && (
                            <div className="space-y-3 animate-in fade-in pt-2 border-t border-slate-100">
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase">Application</label>
                                        <select
                                            value={application} onChange={e => setApplication(e.target.value)}
                                            className="w-full p-2 bg-slate-50 border rounded-lg text-sm outline-none">
                                            {CATEGORY_MAPPING[category].map(a => <option key={a} value={a}>{a}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase">Target Finish</label>
                                        <input
                                            type="month"
                                            value={targetMonth} onChange={e => setTargetMonth(e.target.value)}
                                            className="w-full p-2 bg-slate-50 border rounded-lg text-sm outline-none"
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 uppercase">Customer (Optional)</label>
                                    <input
                                        type="text" placeholder="e.g. K.Somsak (ABC Corp)"
                                        value={customer} onChange={e => setCustomer(e.target.value)}
                                        className="w-full p-2 bg-slate-50 border rounded-lg text-sm outline-none"
                                    />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 uppercase">Impact / Result</label>
                                    <textarea placeholder="Details..." className="w-full p-3 bg-slate-50 border rounded-lg h-20 text-sm"
                                        value={impact} onChange={e => setImpact(e.target.value)} />
                                </div>
                            </div>
                        )}
                        <button type="submit" disabled={loading || !title}
                            className="w-full bg-dhl-red text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-red-700 disabled:opacity-50">
                            {loading ? 'Saving...' : <>Log Entry <Send size={18} /></>}
                        </button>
                    </form>
                </div>
            );
        };

        const LogCard = ({ log, onDelete, onUpdate }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            const [isEditingInfo, setIsEditingInfo] = useState(false);
            const [historyLimit, setHistoryLimit] = useState(3);

            // Update Log fields
            const [editImpact, setEditImpact] = useState('');
            const [lastUpdateDate, setLastUpdateDate] = useState(() => new Date().toISOString().split('T')[0]);
            const [updateChannel, setUpdateChannel] = useState(log.updateChannel || 'Chat');

            // Edit Info fields
            const [editTitle, setEditTitle] = useState(log.title);
            const [editCustomer, setEditCustomer] = useState(log.customer || '');
            const [editTargetMonth, setEditTargetMonth] = useState(log.targetMonth || '');
            const [editPriority, setEditPriority] = useState(log.priority || 'P3');

            // Fallback if log.category is from old version and not in new MAPPING
            const defaultCategory = Object.keys(CATEGORY_MAPPING)[0];
            const safeCategory = (log.category && CATEGORY_MAPPING[log.category]) ? log.category : defaultCategory;
            const [editCategory, setEditCategory] = useState(safeCategory);

            // Fallback for Application
            const safeAppList = CATEGORY_MAPPING[safeCategory] || [];
            const safeApp = (log.application && safeAppList.includes(log.application))
                ? log.application
                : safeAppList[0] || 'Other';

            const [editApp, setEditApp] = useState(safeApp);

            // Handlers
            const handleEditCategoryChange = (e) => {
                const newCat = e.target.value;
                setEditCategory(newCat);
                const newApps = CATEGORY_MAPPING[newCat] || [];
                setEditApp(newApps[0] || '');
            };

            const handleUpdateLog = (e) => {
                if (e) e.stopPropagation();

                if (!editImpact.trim()) {
                    alert("Please enter log details before posting.");
                    return;
                }

                let currentHistory = Array.isArray(log.history) ? [...log.history] : [];

                // Preserve the legacy existing log.impact as the oldest history entry
                if (log.impact && log.impact.trim() !== '') {
                    const isImpactInHistory = currentHistory.some(h => h.impact === log.impact);
                    if (!isImpactInHistory) {
                        currentHistory.push({
                            id: 'legacy-first-log',
                            impact: log.impact,
                            date: log.lastUpdateDate || log.date || log.createdAt,
                            channel: log.updateChannel || 'Unknown',
                            createdAt: log.createdAt || new Date().toISOString()
                        });
                    }
                }

                const newHistoryRecord = {
                    id: Date.now().toString(),
                    impact: editImpact,
                    date: lastUpdateDate,
                    channel: updateChannel,
                    createdAt: new Date().toISOString()
                };

                onUpdate(log.id, {
                    impact: editImpact,
                    lastUpdateDate,
                    updateChannel,
                    history: [newHistoryRecord, ...currentHistory]
                });

                // Clear the form for the next update so it's fresh
                setEditImpact('');
                setLastUpdateDate(new Date().toISOString().split('T')[0]);
                setIsExpanded(false);
                setHistoryLimit(3);
            };

            const handleDeleteHistoryLog = (e, historyId) => {
                if (e) e.stopPropagation();
                if (!window.confirm("Are you sure you want to delete this specific log update?")) return;

                let currentHistory = Array.isArray(log.history) ? [...log.history] : [];

                // If the user deletes the auto-populated legacy log
                if (historyId === 'legacy-first-log') {
                    // We'll filter it out of display by adding a dummy flag to the task itself
                    // or simply clearing out the main log.impact if it's the last one. 
                    // The cleanest way is to just wipe the old legacy string if deleted:
                    onUpdate(log.id, {
                        impact: "(Log deleted)",
                        history: currentHistory // keep history array the same
                    });
                    return;
                }

                const updatedHistory = currentHistory.filter(h => h.id !== historyId);

                // Also update the main 'impact' to show the next most recent one if we deleted the top one
                let newMainImpact = editImpact;
                let newMainDate = lastUpdateDate;
                let newMainChannel = updateChannel;

                if (updatedHistory.length > 0) {
                    newMainImpact = updatedHistory[0].impact;
                    newMainDate = updatedHistory[0].date;
                    newMainChannel = updatedHistory[0].channel;
                }

                onUpdate(log.id, {
                    impact: newMainImpact,
                    lastUpdateDate: newMainDate,
                    updateChannel: newMainChannel,
                    history: updatedHistory
                });
            };

            const handleSaveInfo = (e) => {
                if (e) e.stopPropagation();
                onUpdate(log.id, {
                    title: editTitle,
                    priority: editPriority,
                    category: editCategory,
                    application: editApp,
                    customer: editCustomer,
                    targetMonth: editTargetMonth
                });
                setIsEditingInfo(false);
            };

            const setToday = (e) => {
                if (e) e.stopPropagation();
                setLastUpdateDate(new Date().toISOString().split('T')[0]);
            };

            const handleToggleComplete = (e) => {
                e.stopPropagation();
                onUpdate(log.id, { status: log.status === 'Done' ? 'Open' : 'Done' });
            };

            // --- Render: Edit Info Mode ---
            if (isEditingInfo) {
                return (
                    <div className="bg-white p-4 rounded-xl shadow-md border-2 border-slate-800 space-y-3">
                        <div className="text-xs text-slate-800 font-bold uppercase mb-2 border-b pb-2">Edit Task Info</div>

                        <div className="space-y-1">
                            <label className="text-xs font-bold text-slate-400">Task Title</label>
                            <input
                                className="w-full p-2 bg-slate-50 border border-slate-200 rounded font-semibold text-slate-800 focus:ring-2 focus:ring-dhl-yellow outline-none"
                                value={editTitle}
                                onChange={e => setEditTitle(e.target.value)}
                                autoFocus
                            />
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-400">Category</label>
                                <select
                                    className="w-full p-2 bg-slate-50 border border-slate-200 rounded text-sm outline-none focus:ring-2 focus:ring-dhl-yellow text-slate-700"
                                    value={editCategory}
                                    onChange={handleEditCategoryChange}
                                >
                                    {Object.keys(CATEGORY_MAPPING).map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>

                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-400">Application</label>
                                <select
                                    className="w-full p-2 bg-slate-50 border border-slate-200 rounded text-sm outline-none focus:ring-2 focus:ring-dhl-yellow text-slate-700"
                                    value={editApp}
                                    onChange={e => setEditApp(e.target.value)}
                                >
                                    {(CATEGORY_MAPPING[editCategory] || []).map(a => <option key={a} value={a}>{a}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-400">Priority</label>
                                <select
                                    className="w-full p-2 bg-slate-50 border border-slate-200 rounded text-sm outline-none focus:ring-2 focus:ring-dhl-yellow text-slate-700"
                                    value={editPriority}
                                    onChange={e => setEditPriority(e.target.value)}
                                >
                                    {Object.entries(PRIORITIES).map(([k, v]) => <option key={k} value={k}>{k}</option>)}
                                </select>
                            </div>

                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-400">Target Month</label>
                                <input
                                    type="month"
                                    className="w-full p-2 bg-slate-50 border border-slate-200 rounded text-sm outline-none focus:ring-2 focus:ring-dhl-yellow text-slate-700"
                                    value={editTargetMonth}
                                    onChange={e => setEditTargetMonth(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="space-y-1">
                            <label className="text-xs font-bold text-slate-400">Customer</label>
                            <input
                                type="text"
                                placeholder="e.g. K.Somsak"
                                className="w-full p-2 bg-slate-50 border border-slate-200 rounded text-sm outline-none focus:ring-2 focus:ring-dhl-yellow text-slate-700"
                                value={editCustomer}
                                onChange={e => setEditCustomer(e.target.value)}
                            />
                        </div>

                        <div className="flex justify-end gap-2 pt-2 border-t mt-4">
                            <button onClick={(e) => { e.stopPropagation(); setIsEditingInfo(false); }} className="px-3 py-1.5 text-slate-500 text-sm hover:bg-slate-100 rounded font-medium">Cancel</button>
                            <button onClick={handleSaveInfo} className="px-3 py-1.5 bg-slate-800 text-white rounded text-sm font-bold shadow-sm hover:bg-slate-700 transition-colors">Save Task Info</button>
                        </div>
                    </div>
                );
            }

            // --- Render: Main Card ---
            return (
                <div
                    onClick={() => !isExpanded && setIsExpanded(true)}
                    className={`rounded-xl shadow-sm border transition-all relative overflow-hidden ${log.status === 'Done' && !isExpanded ? 'bg-green-50/50 border-green-200 opacity-75' : 'bg-white'} ${isExpanded ? 'border-dhl-yellow ring-2 ring-yellow-100' : 'border-slate-100 hover:shadow-md cursor-pointer'}`}
                >
                    <div className="p-4 relative">
                        <div className="flex justify-between items-start">
                            <div className="flex-1 w-full">
                                {/* Badges */}
                                <div className="flex flex-wrap items-center gap-2 text-xs font-semibold text-dhl-red uppercase mb-2">
                                    {log.priority && PRIORITIES[log.priority] && (
                                        <span className={`px-2 py-0.5 rounded-full text-[10px] ${PRIORITIES[log.priority].color}`}>{log.priority}</span>
                                    )}
                                    <span className="bg-red-50 px-2 py-0.5 rounded-full">{log.category}</span>
                                    {log.application && <span className="bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full border border-slate-200">{log.application}</span>}

                                    {log.lastUpdateDate && !isExpanded && (
                                        <span className="flex items-center gap-1 text-slate-600 normal-case ml-auto sm:ml-0 bg-yellow-50 px-2 py-0.5 rounded border border-yellow-100">
                                            <span className={`w-2 h-2 rounded-full ${log.updateChannel === 'Email' ? 'bg-blue-400' : log.updateChannel === 'Phone' ? 'bg-green-400' : 'bg-purple-400'}`}></span>
                                            {(() => {
                                                try {
                                                    return new Date(log.lastUpdateDate).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                                                } catch (e) {
                                                    return 'Invalid Date';
                                                }
                                            })()}
                                        </span>
                                    )}
                                </div>

                                {/* Title */}
                                <div className="flex items-start justify-between">
                                    <div>
                                        <h4 className="text-slate-800 font-bold text-lg leading-snug mb-1">{log.title}</h4>
                                        {log.customer && <div className="text-xs font-bold text-slate-400 flex items-center gap-1"><span className="w-1 h-1 bg-slate-400 rounded-full"></span> {log.customer}</div>}
                                    </div>

                                    {!isExpanded && (
                                        <button onClick={handleToggleComplete} className={`ml-3 flex-shrink-0 p-2 rounded-full transition-colors ${log.status === 'Done' ? 'text-green-600 bg-green-100 hover:bg-green-200' : 'text-slate-300 hover:text-green-500 hover:bg-green-50'}`} title={log.status === 'Done' ? "Mark as Open" : "Mark as Done"}>
                                            <CheckCircle size={20} />
                                        </button>
                                    )}
                                </div>

                                {/* Days Remaining Countdown (Only when closed) */}
                                {!isExpanded && log.status !== 'Done' && (
                                    <div className="mt-3">
                                        {(() => {
                                            const lastActionDate = log.lastUpdateDate || log.date;
                                            const pDays = PRIORITIES[log.priority]?.days || 30;
                                            const dueDate = addBusinessDays(lastActionDate, pDays);
                                            const daysLeft = getBusinessDaysLeft(dueDate);

                                            let colorClass = 'bg-green-100 text-green-700 border-green-200';
                                            let label = `${daysLeft} Days Left`;

                                            if (daysLeft < 0) {
                                                colorClass = 'bg-red-100 text-red-700 border-red-200 animate-pulse';
                                                label = `${Math.abs(daysLeft)} Days Overdue`;
                                            } else if (daysLeft === 0) {
                                                colorClass = 'bg-red-50 text-red-600 border-red-100';
                                                label = 'Need Update Today';
                                            } else if (daysLeft <= 2) {
                                                colorClass = 'bg-orange-100 text-orange-700 border-orange-200';
                                            }

                                            return (
                                                <div
                                                    className={`inline-flex text-[10px] font-bold px-2 py-1 rounded border items-center gap-1 ${colorClass}`}
                                                    title={`Target Date: ${dueDate.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} (Excl. Weekends)`}
                                                >
                                                    <span className="text-sm">⏳</span>
                                                    {label}
                                                </div>
                                            );
                                        })()}
                                    </div>
                                )}

                                {!isExpanded && log.impact && (
                                    <div className="text-slate-500 text-sm bg-slate-50 p-2 rounded-lg italic line-clamp-2 mt-3">
                                        "{log.impact}"
                                    </div>
                                )}
                            </div>
                        </div>

                        {isExpanded && (
                            <div className="mt-4 pt-4 border-t border-slate-100 animate-in slide-in-from-top-2 duration-200 cursor-default" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-3">
                                    <div className="text-sm font-bold text-dhl-red uppercase flex items-center gap-1">
                                        <Edit2 size={14} /> Update Log
                                    </div>
                                    <div className="flex gap-2 items-center">
                                        <button onClick={handleToggleComplete} className={`px-2 py-1 text-xs font-bold rounded flex items-center gap-1 ${log.status === 'Done' ? 'text-green-700 bg-green-100' : 'text-slate-500 bg-slate-100 hover:bg-green-50 hover:text-green-600'}`}>
                                            <CheckCircle size={14} /> {log.status === 'Done' ? 'Done' : 'Mark Done'}
                                        </button>
                                        <button onClick={(e) => { e.stopPropagation(); setIsExpanded(false); }} className="text-xs text-slate-400 hover:text-slate-600 font-bold px-2 py-1 bg-slate-100 rounded">Close</button>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-400">Date Update</label>
                                            <div className="flex gap-2">
                                                <input
                                                    type="date"
                                                    className="flex-1 p-2 bg-slate-50 border rounded text-sm outline-none focus:ring-1 focus:ring-dhl-yellow"
                                                    value={lastUpdateDate}
                                                    onChange={e => setLastUpdateDate(e.target.value)}
                                                />
                                            </div>
                                        </div>

                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-400">Via</label>
                                            <select
                                                className="w-full p-2 bg-slate-50 border rounded text-sm outline-none focus:ring-1 focus:ring-dhl-yellow text-slate-700"
                                                value={updateChannel}
                                                onChange={e => setUpdateChannel(e.target.value)}
                                            >
                                                {['Chat', 'Phone', 'Email', 'Facing', 'App'].map(ch => (
                                                    <option key={ch} value={ch}>{ch}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-400">Log Details</label>
                                        <textarea
                                            className="w-full p-2 bg-slate-50 border rounded text-sm min-h-[80px] focus:ring-2 focus:ring-dhl-yellow outline-none shadow-inner"
                                            value={editImpact}
                                            onChange={e => setEditImpact(e.target.value)}
                                            placeholder="What's the update?"
                                        />
                                    </div>

                                    <button
                                        onClick={handleUpdateLog}
                                        className="w-full py-2.5 bg-dhl-yellow text-slate-800 rounded-lg text-sm font-bold shadow-sm hover:bg-yellow-400 transition-colors mt-2"
                                    >
                                        Post Update
                                    </button>
                                </div>

                                {/* Log History Section */}
                                {(() => {
                                    // Combine existing history array with the legacy single impact if it is not already included
                                    let displayHistory = Array.isArray(log.history) ? [...log.history] : [];
                                    if (log.impact && log.impact.trim() !== '') {
                                        const isImpactInHistory = displayHistory.some(h => h.impact === log.impact);
                                        if (!isImpactInHistory) {
                                            displayHistory.push({
                                                id: 'legacy-first-log',
                                                impact: log.impact,
                                                date: log.lastUpdateDate || log.date || log.createdAt,
                                                channel: log.updateChannel || 'Unknown'
                                            });
                                        }
                                    }

                                    if (displayHistory.length === 0) return null;

                                    return (
                                        <div className="mt-6 pt-4 border-t border-slate-100">
                                            <div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                                                <Calendar size={12} /> Log History ({displayHistory.length})
                                            </div>
                                            <div className="space-y-4">
                                                {displayHistory.slice(0, historyLimit).map((hist, index) => (
                                                    <div key={hist.id || index} className="relative pl-4 border-l-[3px] border-slate-200 group">
                                                        <div className="absolute -left-[7.5px] top-1.5 w-3 h-3 rounded-full border-2 border-white bg-slate-300"></div>
                                                        <div className="flex items-center justify-between text-xs font-semibold text-slate-500 mb-1">
                                                            <div className="flex items-center gap-2">
                                                                <span>{(() => {
                                                                    try {
                                                                        return new Date(hist.date || hist.createdAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                                                                    } catch (e) { return 'Unknown Date'; }
                                                                })()}</span>
                                                                <span className="w-1 h-1 rounded-full bg-slate-400"></span>
                                                                <span className={`px-1.5 py-0.5 rounded text-[10px] ${hist.channel === 'Email' ? 'bg-blue-50 text-blue-600' : hist.channel === 'Phone' ? 'bg-green-50 text-green-600' : 'bg-purple-50 text-purple-600'}`}>{hist.channel || 'Unknown'}</span>
                                                            </div>
                                                            <button
                                                                onClick={(e) => handleDeleteHistoryLog(e, hist.id)}
                                                                className="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-red-500 transition-opacity p-1"
                                                            >
                                                                <X size={14} />
                                                            </button>
                                                        </div>
                                                        <div className="text-sm text-slate-700 leading-relaxed font-medium mt-1">"{hist.impact}"</div>
                                                    </div>
                                                ))}

                                                {displayHistory.length > historyLimit && (
                                                    <div className="text-center pt-2">
                                                        <button
                                                            onClick={(e) => { e.stopPropagation(); setHistoryLimit(prev => prev + 3); }}
                                                            className="text-xs font-bold text-dhl-red hover:text-red-700 bg-red-50 hover:bg-red-100 px-4 py-1.5 rounded-full transition-colors"
                                                        >
                                                            Show More (+3)
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })()}


                                <div className="flex justify-between items-center border-t border-slate-100 mt-6 pt-4">
                                    <button
                                        onClick={(e) => { e.stopPropagation(); setIsEditingInfo(true); }}
                                        className="flex items-center gap-1.5 px-3 py-2 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors border border-slate-200 shadow-sm"
                                    >
                                        <Edit2 size={16} /> Edit Task Info
                                    </button>

                                    {onDelete && (
                                        <button
                                            onClick={(e) => {
                                                e.stopPropagation();
                                                if (window.confirm('Are you sure you want to delete this task?')) {
                                                    onDelete(log.id);
                                                }
                                            }}
                                            className="flex items-center gap-1.5 px-3 py-2 text-sm font-bold text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors shadow-sm"
                                        >
                                            <Trash2 size={16} /> Delete Task
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Timeline = ({ logs, onDelete, onUpdate, queryLimit, onLoadAll }) => {
            const [filterApp, setFilterApp] = useState('All');
            const [sortBy, setSortBy] = useState('updated'); // updated | created
            const [statusTab, setStatusTab] = useState('ongoing');


            const filteredLogs = useMemo(() => {
                let result = [...logs];

                // 1. Status Filter
                if (statusTab === 'ongoing') {
                    result = result.filter(log => log.status !== 'Done');
                } else if (statusTab === 'complete') {
                    result = result.filter(log => log.status === 'Done');
                } else if (statusTab === 'overdue') {
                    result = result.filter(log => {
                        if (log.status === 'Done') return false;

                        const lastActionDate = log.lastUpdateDate || log.date;
                        const pDays = PRIORITIES[log.priority]?.days || 30;
                        const dueDate = addBusinessDays(lastActionDate, pDays);
                        const daysLeft = getBusinessDaysLeft(dueDate);

                        return daysLeft < 0; // Negative means overdue
                    });
                }

                // 2. App Filter
                if (filterApp !== 'All') {
                    if (filterApp.startsWith('CAT:')) {
                        const cat = filterApp.replace('CAT:', '');
                        result = result.filter(log => log.category === cat);
                    } else {
                        result = result.filter(log => log.application === filterApp);
                    }
                }

                // 3. Sort
                if (sortBy === 'updated') {
                    result.sort((a, b) => {
                        const dateA = a.lastUpdateDate ? new Date(a.lastUpdateDate) : new Date(a.date);
                        const dateB = b.lastUpdateDate ? new Date(b.lastUpdateDate) : new Date(b.date);
                        return dateB - dateA; // Descending
                    });
                } else {
                    // Sort by Created Date (or 'date' field)
                    result.sort((a, b) => new Date(b.date) - new Date(a.date));
                }
                return result;
            }, [logs, filterApp, sortBy, statusTab]);

            const groupedLogs = useMemo(() => {
                const groups = {};
                filteredLogs.forEach(log => {
                    // Grouping Logic:
                    // If sorting by Updated -> Group by "Last Updated: <Date>"
                    // If sorting by Created -> Group by Month
                    let groupKey;
                    if (sortBy === 'updated') {
                        let d;
                        try {
                            d = log.lastUpdateDate ? new Date(log.lastUpdateDate) : new Date(log.date);
                            if (isNaN(d.getTime())) throw new Error('Invalid');
                        } catch (e) {
                            d = new Date(); // Fallback
                        }

                        // Check if today
                        const today = new Date();
                        if (d.toDateString() === today.toDateString()) {
                            groupKey = 'Today';
                        } else {
                            groupKey = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        }
                    } else {
                        try {
                            const d = new Date(log.date);
                            if (isNaN(d.getTime())) throw new Error('Invalid');
                            groupKey = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                        } catch (e) {
                            groupKey = 'Recent / Unsorted';
                        }
                    }

                    if (!groups[groupKey]) groups[groupKey] = [];
                    groups[groupKey].push(log);
                });
                return Object.entries(groups); // Already sorted by nature of processedLogs order mostly, but we trust the list order
            }, [filteredLogs, sortBy]);

            const EmptyState = () => (
                <div className="text-center py-12 flex flex-col items-center opacity-50">
                    <LayoutList size={48} className="mb-2 text-slate-300" />
                    <p className="text-slate-400">No {statusTab} logs found.</p>
                </div>
            );

            return (
                <div className="space-y-4 pb-24">
                    {/* Status Tabs */}
                    <div className="bg-slate-200 p-1 rounded-lg flex">
                        <button
                            onClick={() => setStatusTab('ongoing')}
                            className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${statusTab === 'ongoing' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            Ongoing
                        </button>
                        <button
                            onClick={() => setStatusTab('overdue')}
                            className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${statusTab === 'overdue' ? 'bg-white text-red-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            Overdue
                        </button>
                        <button
                            onClick={() => setStatusTab('complete')}
                            className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${statusTab === 'complete' ? 'bg-white text-green-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            Complete
                        </button>
                    </div>

                    {/* Controls Header */}
                    <div className="sticky top-[72px] z-30 bg-slate-100/95 backdrop-blur py-2 -mx-4 px-4 border-b border-slate-200">
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider">
                                {filterApp === 'All' ? 'Timeline' : `${filterApp} Logs`}
                            </h3>
                            <button
                                onClick={() => setSortBy(sortBy === 'updated' ? 'created' : 'updated')}
                                className="text-xs flex items-center gap-1 font-bold text-dhl-red hover:bg-red-50 px-2 py-1 rounded transition-colors"
                            >
                                <span className="text-slate-400 font-normal text-[10px]">Sort by:</span>
                                {sortBy === 'updated' ? 'Last Updated' : 'Date Created'}
                            </button>
                        </div>

                        {/* Filter Dropdown */}
                        <div className="pb-2">
                            <select
                                value={filterApp}
                                onChange={(e) => setFilterApp(e.target.value)}
                                className="w-full bg-white border border-slate-300 rounded-lg px-3 py-2.5 text-sm font-bold text-slate-700 shadow-sm focus:border-dhl-yellow focus:ring-1 focus:ring-dhl-yellow outline-none cursor-pointer"
                            >
                                <option value="All">🌍 All Categories & Apps</option>
                                {Object.entries(CATEGORY_MAPPING).map(([categoryName, apps]) => (
                                    <optgroup key={categoryName} label={`🗂️ [${categoryName}]`} className="bg-slate-100 text-slate-500 font-bold uppercase tracking-wider text-xs">
                                        <option value={`CAT:${categoryName}`} className="text-slate-800 font-bold bg-white normal-case text-sm">↳ All {categoryName}</option>
                                        {apps.map(app => (
                                            <option key={app} value={app} className="text-slate-600 bg-white normal-case text-sm">  • {app}</option>
                                        ))}
                                    </optgroup>
                                ))}
                            </select>
                        </div>
                    </div>

                    {groupedLogs.length === 0 ? <EmptyState /> : (
                        <div className="space-y-6">
                            {groupedLogs.map(([group, groupLogs]) => (
                                <div key={group} className="animate-in fade-in duration-500">
                                    <div className="flex items-center gap-2 mb-3">
                                        <div className="h-[1px] flex-1 bg-slate-200"></div>
                                        <h3 className="text-xs font-bold text-slate-400 uppercase bg-slate-100 px-2">{group}</h3>
                                        <div className="h-[1px] flex-1 bg-slate-200"></div>
                                    </div>
                                    <div className="space-y-3">
                                        {groupLogs.map(log => (
                                            <LogCard key={log.id} log={log} onDelete={onDelete} onUpdate={onUpdate} />
                                        ))}
                                    </div>
                                </div>
                            ))}

                            {/* Load All Button */}
                            {queryLimit && (
                                <div className="pt-4 text-center">
                                    <div className="text-xs text-slate-400 mb-2">Showing limited recent items</div>
                                    <button
                                        onClick={onLoadAll}
                                        className="bg-slate-100 text-slate-600 px-6 py-2 rounded-full text-xs font-bold hover:bg-slate-200 transition-colors shadow-sm border border-slate-200"
                                    >
                                        Load Full History
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const Dashboard = ({ logs }) => {
            const [selectedMonth, setSelectedMonth] = React.useState('All');
            const [isRunningScript, setIsRunningScript] = React.useState(false);

            // Recharts Components (Global from CDN)
            const COLORS = ['#0088FE', '#00C49F', '#FFBB28', '#FF8042', '#8884d8', '#ff7300'];

            // 1. Prepare Data
            const currentYear = new Date().getFullYear();

            // A. Yearly Stats (Bar Chart)
            const yearlyData = React.useMemo(() => {
                const data = Array(12).fill(0).map((_, i) => ({
                    name: new Date(0, i).toLocaleString('en-US', { month: 'short' }),
                    Total: 0,
                    Done: 0
                }));

                logs.forEach(log => {
                    try {
                        const d = new Date(log.date);
                        if (d.getFullYear() === currentYear) {
                            const m = d.getMonth();
                            data[m].Total++;
                            if (log.status === 'Done') data[m].Done++;
                        }
                    } catch (e) { }
                });
                return data;
            }, [logs, currentYear]);

            // B. Filtered Logs for Priority & Category
            const filteredLogs = React.useMemo(() => {
                if (selectedMonth === 'All') return logs;
                return logs.filter(log => {
                    try {
                        const d = new Date(log.date);
                        return d.getMonth() === parseInt(selectedMonth) && d.getFullYear() === currentYear;
                    } catch (e) { return false; }
                });
            }, [logs, selectedMonth, currentYear]);

            // C. Priority Stats
            const priorityStats = React.useMemo(() => {
                const map = {};
                filteredLogs.forEach(l => {
                    const p = l.priority || 'P3';
                    map[p] = (map[p] || 0) + 1;
                });
                return Object.entries(map).map(([name, value]) => ({ name, value }));
            }, [filteredLogs]);

            // D. Category Stats (Detailed)
            const categoryStats = React.useMemo(() => {
                const map = {};
                filteredLogs.forEach(l => {
                    const c = l.category || 'Uncategorized';
                    if (!map[c]) map[c] = { name: c, total: 0, done: 0, open: 0 };
                    map[c].total++;
                    if (l.status === 'Done') map[c].done++;
                    else map[c].open++;
                });
                return Object.values(map).sort((a, b) => b.total - a.total);
            }, [filteredLogs]);

            // Helper: Run Script
            const handleRunScript = async () => {
                const scriptUrl = localStorage.getItem('workpulse_script_url');
                if (!scriptUrl) {
                    const url = prompt("Please enter your Google Apps Script Web App URL to enable this feature:\n(You need to Deploy as Web App -> Execute as Me -> Access: Anyone)");
                    if (url) {
                        localStorage.setItem('workpulse_script_url', url);
                        window.location.reload(); // Reload to pick up
                    }
                    return;
                }

                setIsRunningScript(true);
                try {
                    // Use no-cors mode since we just want to trigger it, don't care about response reading in simple mode
                    await fetch(scriptUrl, { mode: 'no-cors' });
                    alert("✅ Trigger command sent!\nCheck your Line in a few seconds.");
                } catch (e) {
                    alert("Error triggering script: " + e.message);
                } finally {
                    setIsRunningScript(false);
                }
            };

            return (
                <div className="space-y-6 pb-20">

                    {/* Section 1: Yearly Performance (Bar Chart) */}
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                        <h3 className="text-sm font-bold uppercase text-slate-500 mb-4 flex items-center gap-2">
                            <i className="fa-solid fa-chart-simple"></i> Yearly Overview ({currentYear})
                        </h3>
                        <div className="h-64 w-full text-xs">
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={yearlyData}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E2E8F0" />
                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fill: '#64748B' }} />
                                    <YAxis axisLine={false} tickLine={false} tick={{ fill: '#64748B' }} />
                                    <ReTooltip
                                        contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}
                                        cursor={{ fill: '#F1F5F9' }}
                                    />
                                    <Legend />
                                    <Bar dataKey="Total" fill="#CBD5E1" radius={[4, 4, 0, 0]} name="All Tasks" />
                                    <Bar dataKey="Done" fill="#16a34a" radius={[4, 4, 0, 0]} name="Completed" />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    {/* Filter Control */}
                    <div className="flex items-center justify-between">
                        <h3 className="font-bold text-slate-700">Detailed Breakdown</h3>
                        <select
                            value={selectedMonth}
                            onChange={e => setSelectedMonth(e.target.value)}
                            className="text-xs border-slate-300 rounded-lg shadow-sm focus:ring-dhl-red focus:border-dhl-red bg-white"
                        >
                            <option value="All">All Time</option>
                            {Array(12).fill(0).map((_, i) => (
                                <option key={i} value={i}>{new Date(0, i).toLocaleString('en-US', { month: 'long' })}</option>
                            ))}
                        </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {/* Section 2: Tasks by Priority */}
                        <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                            <h3 className="text-sm font-bold uppercase text-slate-500 mb-2">Tasks by Priority</h3>
                            <div className="h-48 flex items-center">
                                <div className="w-1/2 h-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie
                                                data={priorityStats}
                                                cx="50%"
                                                cy="50%"
                                                innerRadius={40}
                                                outerRadius={70}
                                                paddingAngle={5}
                                                dataKey="value"
                                            >
                                                {priorityStats.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                                ))}
                                            </Pie>
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="w-1/2 pl-4 space-y-1">
                                    {priorityStats.map((entry, index) => (
                                        <div key={index} className="flex items-center gap-2 text-xs">
                                            <div className="w-2 h-2 rounded-full" style={{ backgroundColor: COLORS[index % COLORS.length] }}></div>
                                            <span className="flex-1 text-slate-600 truncate">{entry.name}</span>
                                            <span className="font-bold text-slate-800">{entry.value}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Section 3: Category Breakdown Table */}
                        <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <h3 className="text-sm font-bold uppercase text-slate-500 mb-4">Category Status</h3>
                            <div className="overflow-y-auto max-h-48 custom-scrollbar pr-2">
                                <table className="w-full text-xs text-left">
                                    <thead className="text-slate-400 font-bold border-b border-slate-100">
                                        <tr>
                                            <th className="pb-2">Category</th>
                                            <th className="pb-2 text-right">Done</th>
                                            <th className="pb-2 text-right">Open</th>
                                            <th className="pb-2 text-right">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {categoryStats.map((cat, idx) => (
                                            <tr key={idx} className="group hover:bg-slate-50">
                                                <td className="py-2 text-slate-700 font-medium">{cat.name}</td>
                                                <td className="py-2 text-right text-green-600 font-bold">{cat.done}</td>
                                                <td className="py-2 text-right text-orange-500">{cat.open}</td>
                                                <td className="py-2 text-right text-slate-400">{cat.total}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Section 4: Trigger Script Button (Daily Briefing) */}
                    <div className="bg-slate-800 text-white p-5 rounded-xl shadow-md border border-slate-700 relative overflow-hidden">
                        <div className="absolute right-0 top-0 w-32 h-32 bg-white/5 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none"></div>

                        <div className="flex justify-between items-start mb-4 relative z-10">
                            <div>
                                <h3 className="text-sm font-bold uppercase text-dhl-yellow flex items-center gap-2">
                                    <MessageSquare size={16} /> Notification Center
                                </h3>
                                <p className="text-xs text-slate-400 mt-1">Force trigger the daily briefing script immediately.</p>
                            </div>
                        </div>

                        <button
                            onClick={handleRunScript}
                            disabled={isRunningScript}
                            className={`w-full py-3 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-sm relative z-10 ${isRunningScript ? 'bg-slate-600 cursor-not-allowed' : 'bg-dhl-red hover:bg-red-700 text-white'}`}
                        >
                            {isRunningScript ? (
                                <><Loader2 className="animate-spin" size={16} /> Sending...</>
                            ) : (
                                <><Share2 size={16} /> Run Daily Briefing Now</>
                            )}
                        </button>
                    </div>
                </div>
            );
        };

        const AppSettings = () => {
            // State initialization from localStorage
            const [scriptUrl, setScriptUrl] = useState(localStorage.getItem('workpulse_script_url') || '');
            const [notifyToken, setNotifyToken] = useState(localStorage.getItem('lineNotifyToken') || '');
            const [defaultPriority, setDefaultPriority] = useState(localStorage.getItem('default_priority') || 'P3');
            const [defaultCategory, setDefaultCategory] = useState(localStorage.getItem('default_category') || 'Standard');
            const [status, setStatus] = useState('');

            const handleSave = () => {
                localStorage.setItem('workpulse_script_url', scriptUrl);
                localStorage.setItem('lineNotifyToken', notifyToken);
                localStorage.setItem('default_priority', defaultPriority);
                localStorage.setItem('default_category', defaultCategory);

                setStatus('Settings Saved Successfully! ✅');
                setTimeout(() => setStatus(''), 3000);
            };

            return (
                <div className="max-w-2xl mx-auto space-y-6 animate-in fade-in slide-in-from-bottom-4">
                    <div className="flex items-center gap-3 mb-6">
                        <div className="p-3 bg-dhl-red text-white rounded-xl shadow-lg">
                            <Settings size={28} />
                        </div>
                        <div>
                            <h2 className="text-2xl font-black text-slate-800">Application Settings</h2>
                            <p className="text-slate-500 text-sm">Configure your automation and preferences.</p>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-1 h-full bg-dhl-red"></div>

                        {/* Automation Section */}
                        <h3 className="text-sm font-bold uppercase text-slate-400 mb-4 flex items-center gap-2">
                            <MessageSquare size={16} /> Automation & Integrations
                        </h3>

                        <div className="space-y-4 mb-8">
                            <div>
                                <label className="block text-xs font-bold text-slate-700 mb-1">Google Apps Script Web App URL</label>
                                <input
                                    type="text"
                                    value={scriptUrl}
                                    onChange={e => setScriptUrl(e.target.value)}
                                    placeholder="https://script.google.com/macros/s/..."
                                    className="w-full p-3 bg-slate-50 border rounded-lg text-sm text-slate-600 focus:ring-2 focus:ring-dhl-red outline-none shadow-inner"
                                />
                                <p className="text-[10px] text-slate-400 mt-1">Found in your Google Apps Script Deployment (Web App).</p>
                            </div>

                            <div className="opacity-75">
                                <label className="block text-xs font-bold text-slate-500 mb-1">Line Notify Token (Legacy)</label>
                                <input
                                    type="password"
                                    value={notifyToken}
                                    onChange={e => setNotifyToken(e.target.value)}
                                    placeholder="Enter Line Notify Token"
                                    className="w-full p-3 bg-slate-50 border rounded-lg text-sm text-slate-600 focus:ring-2 focus:ring-slate-300 outline-none"
                                />
                            </div>
                        </div>

                        <div className="h-px bg-slate-100 my-6"></div>

                        {/* Preferences Section */}
                        <h3 className="text-sm font-bold uppercase text-slate-400 mb-4 flex items-center gap-2">
                            <i className="fa-solid fa-sliders"></i> Default Preferences
                        </h3>

                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-700 mb-1">Default Priority</label>
                                <select
                                    value={defaultPriority}
                                    onChange={e => setDefaultPriority(e.target.value)}
                                    className="w-full p-3 bg-white border rounded-lg text-sm font-bold outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-dhl-red"
                                >
                                    {Object.entries(PRIORITIES).map(([k, v]) => (
                                        <option key={k} value={k}>{k} - {v.days} Days</option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-700 mb-1">Default Category</label>
                                <select
                                    value={defaultCategory}
                                    onChange={e => setDefaultCategory(e.target.value)}
                                    className="w-full p-3 bg-white border rounded-lg text-sm font-bold outline-none ring-1 ring-slate-200 focus:ring-dhl-red"
                                >
                                    {Object.keys(CATEGORY_MAPPING).map(c => (
                                        <option key={c} value={c}>{c}</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                    </div>

                    {/* Action Bar */}
                    <div className="flex justify-end items-center gap-4">
                        {status && <span className="text-green-600 font-bold text-sm animate-pulse">{status}</span>}
                        <button
                            onClick={handleSave}
                            className="bg-dhl-red text-white py-3 px-8 rounded-xl font-bold shadow-lg hover:bg-red-700 hover:shadow-xl transition-all transform hover:-translate-y-0.5 active:translate-y-0"
                        >
                            Save Settings
                        </button>
                    </div>

                    <div className="text-center mt-8">
                        <p className="text-[10px] text-slate-400">WorkPulse 365 v2.1.0 • Built for DHL Express Support Team</p>
                    </div>
                </div>
            );
        };

        const Profile = ({ user, onLogout }) => {
            return (
                <div className="space-y-6 animate-in fade-in">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 text-center relative overflow-hidden">
                        <div className="absolute top-0 w-full h-1 bg-gradient-to-r from-dhl-yellow to-dhl-red"></div>
                        <div className="w-24 h-24 bg-slate-50 rounded-full mx-auto mb-4 flex items-center justify-center border-4 border-white shadow-md">
                            {user.photoURL ?
                                <img src={user.photoURL} className="w-full h-full rounded-full" /> :
                                <span className="text-4xl">👤</span>
                            }
                        </div>
                        <h2 className="text-2xl font-black text-slate-800 tracking-tight">{user.displayName}</h2>
                        <p className="text-slate-500 text-sm font-medium">{user.email}</p>
                        <div className="mt-4 flex justify-center gap-2">
                            <div className="px-3 py-1 bg-slate-100 rounded-full text-xs font-bold text-slate-500">ID: {user?.uid?.slice(0, 6)}...</div>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <h3 className="text-sm font-bold uppercase text-slate-400 mb-4">Account Actions</h3>
                        <button onClick={onLogout} className="w-full py-3 border-2 border-slate-100 hover:border-red-100 hover:bg-red-50 text-slate-600 hover:text-red-600 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                            <LogOut size={18} /> Sign Out
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [logs, setLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('home');
            const [loading, setLoading] = useState(true);
            const [authLoading, setAuthLoading] = useState(true);
            const [error, setError] = useState('');
            const [queryLimit, setQueryLimit] = useState(10); // Limit initial reads

            const handleLogin = async () => {
                try {
                    const provider = new GoogleAuthProvider();
