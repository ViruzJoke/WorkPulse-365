<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkPulse 365 (Portable)</title>

    <!-- 1. Tailwind CSS (Client-side version for development/portable use) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dhl: {
                            yellow: '#FFCC00',
                            red: '#D40511',
                        }
                    },
                    fontFamily: {
                        sans: ['Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- 2. Babel for JSX Support -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 3. Import Map for Packages -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0",
            "recharts": "https://esm.sh/recharts@2.10.3?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
</head>

<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <!-- 4. Application Logic -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import ReactDOM from 'react-dom/client';
        import { Menu, Send, PlusCircle, Trash2, Edit2, Calendar, LayoutList, PieChart as ChartIcon, Award, TrendingUp, Loader2, Share2, CheckCircle, MessageSquare, LogOut, User } from 'lucide-react';
        import { BarChart, Bar, XAxis, Tooltip as ReTooltip, ResponsiveContainer, PieChart, Pie, Cell } from 'recharts';

        // --- Firebase Imports (Direct from Google CDN for Module) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, updateDoc, doc, limit, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyDeKCmhY0NN2VA0yHqQS9Jr4lBIi5AAJg4",
            authDomain: "workpulse-365.firebaseapp.com",
            projectId: "workpulse-365",
            storageBucket: "workpulse-365.firebasestorage.app",
            messagingSenderId: "289186802306",
            appId: "1:289186802306:web:b3005140e698c35e01629b"
        };

        // Initialize Firebase safely
        let auth, db;
        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            // Enable Offline Persistence
            enableIndexedDbPersistence(db, { forceOwnership: false }).catch((err) => {
                if (err.code == 'failed-precondition') {
                    console.warn("Persistence failed: Multiple tabs open");
                } else if (err.code == 'unimplemented') {
                    console.warn("Persistence not supported");
                }
            });
        } catch (err) {
            console.error("Firebase Init Error:", err);
        }

        // --- Components ---

        const Header = ({ user, onLogout }) => (
            <header className="bg-dhl-yellow shadow-md sticky top-0 z-50">
                <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                    <div className="flex items-center space-x-3">
                        <div className="bg-dhl-red text-white p-1 rounded transform -skew-x-12 shadow-sm">
                            <h1 className="font-black italic text-2xl tracking-tighter px-1">DHL</h1>
                        </div>
                        <span className="text-dhl-red font-bold text-xl hidden sm:block">WorkPulse 365</span>
                        <span className="text-dhl-red font-bold text-xl sm:hidden">WP365</span>
                    </div>
                    {user && (
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-2 mr-1">
                                {user.photoURL ? (
                                    <img src={user.photoURL} alt="Profile" className="w-9 h-9 rounded-full border-2 border-white shadow-sm" />
                                ) : (
                                    <div className="w-9 h-9 rounded-full bg-white text-dhl-red border-2 border-dhl-red flex items-center justify-center font-bold shadow-sm">
                                        {user.displayName ? user.displayName[0].toUpperCase() : <User size={18} />}
                                    </div>
                                )}
                                <span className="hidden md:block font-bold text-dhl-red text-sm">{user.displayName}</span>
                            </div>
                            <button onClick={onLogout} className="bg-white/20 text-dhl-red hover:bg-white/40 p-2 rounded-full transition-colors" title="Logout">
                                <LogOut size={18} />
                            </button>
                        </div>
                    )}
                </div>
            </header>
        );

        // --- Constants ---
        const PRIORITIES = {
            'P1': { label: 'P1 - Critical (1 Day)', color: 'bg-red-600 text-white', days: 1 },
            'P2': { label: 'P2 - High (3 Days)', color: 'bg-orange-500 text-white', days: 3 },
            'P3': { label: 'P3 - Medium (5 Days)', color: 'bg-yellow-500 text-white', days: 5 },
            'P4': { label: 'P4 - Low (10 Days)', color: 'bg-blue-500 text-white', days: 10 },
            'P5': { label: 'P5 - Trivial (30 Days)', color: 'bg-slate-400 text-white', days: 30 }
        };

        // Helper: Add Business Days (Skip Sat/Sun, with Safety)
        const addBusinessDays = (dateStr, days) => {
            if (!dateStr) return new Date();
            let current = new Date(dateStr);
            if (isNaN(current.getTime())) return new Date(); // Fallback

            let added = 0;
            let safety = 0;
            while (added < days && safety < 365) {
                current.setDate(current.getDate() + 1);
                const day = current.getDay();
                if (day !== 0 && day !== 6) added++;
                safety++;
            }
            return current;
        };

        // Helper: Get Business Days Remaining (with Safety)
        const getBusinessDaysLeft = (targetDate) => {
            if (!targetDate || isNaN(targetDate.getTime())) return 0;

            const start = new Date();
            start.setHours(0, 0, 0, 0);
            const end = new Date(targetDate);
            end.setHours(0, 0, 0, 0);

            let count = 0;
            let safety = 0;

            if (start > end) {
                let current = new Date(end);
                while (current < start && safety < 1000) {
                    current.setDate(current.getDate() + 1);
                    const day = current.getDay();
                    if (day !== 0 && day !== 6) count++;
                    safety++;
                }
                return -count;
            }

            let current = new Date(start);
            while (current < end && safety < 1000) {
                current.setDate(current.getDate() + 1);
                const day = current.getDay();
                if (day !== 0 && day !== 6) count++;
                safety++;
            }
            return count;
        };

        const CATEGORY_MAPPING = {
            'Standard': ['MyDHL+', 'Proview', 'Other'],
            'Integration': ['MyDHL API', 'DCG', 'eAlert', 'DEC', 'Other'],
            'Project': ['Access', 'Excel', 'Meeting', 'Other']
        };

        const ALL_APPS = ['All', ...new Set(Object.values(CATEGORY_MAPPING).flat())];

        const QuickLog = ({ onAddLog }) => {
            const [title, setTitle] = useState('');
            const [category, setCategory] = useState(Object.keys(CATEGORY_MAPPING)[0]);
            const [application, setApplication] = useState(CATEGORY_MAPPING[Object.keys(CATEGORY_MAPPING)[0]][0]);
            const [priority, setPriority] = useState('P3');
            const [customer, setCustomer] = useState('');
            const [targetMonth, setTargetMonth] = useState('');
            const [impact, setImpact] = useState('');
            const [isExpanded, setIsExpanded] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleCategoryChange = (e) => {
                const newCat = e.target.value;
                setCategory(newCat);
                setApplication(CATEGORY_MAPPING[newCat][0]);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!title.trim()) return;
                setLoading(true);
                await onAddLog({
                    title, category, application, priority, customer, targetMonth, impact,
                    date: new Date().toISOString().split('T')[0],
                    createdAt: new Date()
                });
                setLoading(false);
                setTitle(''); setCustomer(''); setImpact(''); setIsExpanded(false);
            };

            return (
                <div className="bg-white rounded-xl shadow-lg p-4 mb-6 border-l-4 border-dhl-red">
                    <div className="flex items-center justify-between mb-2">
                        <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <PlusCircle className="text-dhl-red" size={20} /> Quick Log
                        </h2>
                        <button onClick={() => setIsExpanded(!isExpanded)} className="text-sm text-slate-500 hover:text-dhl-red">
                            {isExpanded ? 'Collapse' : 'Expand'}
                        </button>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-3">
                        <div className="space-y-2">
                            <input
                                type="text" placeholder="What did you achieve today?"
                                className="w-full p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-dhl-yellow outline-none font-medium"
                                value={title} onChange={e => setTitle(e.target.value)} disabled={loading}
                            />
                            <div className="flex gap-2">
                                <select
                                    value={category} onChange={handleCategoryChange}
                                    className="flex-1 p-2 bg-slate-100 border rounded-lg text-sm font-medium outline-none focus:ring-2 focus:ring-dhl-yellow">
                                    {Object.keys(CATEGORY_MAPPING).map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <select
                                    value={priority} onChange={e => setPriority(e.target.value)}
                                    className={`w-24 p-2 border rounded-lg text-sm font-bold outline-none focus:ring-2 focus:ring-dhl-yellow ${PRIORITIES[priority].color}`}>
                                    {Object.keys(PRIORITIES).map(p => <option key={p} value={p} className="bg-white text-slate-800">{p}</option>)}
                                </select>
                            </div>
                        </div>

                        {isExpanded && (
                            <div className="space-y-3 animate-in fade-in pt-2 border-t border-slate-100">
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase">Application</label>
                                        <select
                                            value={application} onChange={e => setApplication(e.target.value)}
                                            className="w-full p-2 bg-slate-50 border rounded-lg text-sm outline-none">
                                            {CATEGORY_MAPPING[category].map(a => <option key={a} value={a}>{a}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase">Target Finish</label>
                                        <input
                                            type="month"
                                            value={targetMonth} onChange={e => setTargetMonth(e.target.value)}
                                            className="w-full p-2 bg-slate-50 border rounded-lg text-sm outline-none"
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 uppercase">Customer (Optional)</label>
                                    <input
                                        type="text" placeholder="e.g. K.Somsak (ABC Corp)"
                                        value={customer} onChange={e => setCustomer(e.target.value)}
                                        className="w-full p-2 bg-slate-50 border rounded-lg text-sm outline-none"
                                    />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 uppercase">Impact / Result</label>
                                    <textarea placeholder="Details..." className="w-full p-3 bg-slate-50 border rounded-lg h-20 text-sm"
                                        value={impact} onChange={e => setImpact(e.target.value)} />
                                </div>
                            </div>
                        )}
                        <button type="submit" disabled={loading || !title}
                            className="w-full bg-dhl-red text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-red-700 disabled:opacity-50">
                            {loading ? 'Saving...' : <>Log Entry <Send size={18} /></>}
                        </button>
                    </form>
                </div>
            );
        };

        const LogCard = ({ log, onDelete, onUpdate }) => {
            const [isUpdateMode, setIsUpdateMode] = useState(false);
            const [showDetail, setShowDetail] = useState(false);
            const [isEditingMainDetail, setIsEditingMainDetail] = useState(false);

            // Form States
            const [editTitle, setEditTitle] = useState(log.title);
            const [editCustomer, setEditCustomer] = useState(log.customer || '');
            const [editTargetMonth, setEditTargetMonth] = useState(log.targetMonth || '');
            const [editPriority, setEditPriority] = useState(log.priority || 'P3');

            // --- Fix for White Screen (Old Data Compatibility) ---
            // Fallback if log.category is from old version and not in new MAPPING
            const defaultCategory = Object.keys(CATEGORY_MAPPING)[0];
            const safeCategory = (log.category && CATEGORY_MAPPING[log.category]) ? log.category : defaultCategory;
            const [editCategory, setEditCategory] = useState(safeCategory);

            // Fallback for Application
            const safeAppList = CATEGORY_MAPPING[safeCategory] || [];
            const safeApp = (log.application && safeAppList.includes(log.application))
                ? log.application
                : safeAppList[0] || 'Other';

            const [editApp, setEditApp] = useState(safeApp);

            const [updateDate, setUpdateDate] = useState(new Date().toISOString().split('T')[0]);
            const [updateChannel, setUpdateChannel] = useState('');
            const [updateContent, setUpdateContent] = useState('');

            // Form State for "Main Detail"
            const [mainDetail, setMainDetail] = useState(log.impact);

            // Handlers
            const handleEditCategoryChange = (e) => {
                const newCat = e.target.value;
                setEditCategory(newCat);
                // Reset app to first item of new category
                const newApps = CATEGORY_MAPPING[newCat] || [];
                setEditApp(newApps[0] || '');
            };

            // Separate Handlers for "Edit Info" vs "Add Update"
            const handleSaveMetadata = () => {
                const updatedLog = {
                    ...log,
                    title: editTitle,
                    priority: editPriority,
                    category: editCategory,
                    application: editApp,
                    customer: editCustomer,
                    targetMonth: editTargetMonth
                };
                onUpdate(log.id, updatedLog);
                setIsUpdateMode(false);
            };

            const handleAddProgress = () => {
                if (!updateContent.trim()) return;

                const newUpdate = {
                    date: updateDate,
                    channel: updateChannel,
                    content: updateContent,
                    timestamp: new Date().toISOString()
                };

                const updatedLog = {
                    ...log,
                    // Only update history fields, keep current metadata
                    updates: [newUpdate, ...(log.updates || [])],
                    lastUpdateDate: updateDate,
                    updateChannel: updateChannel
                };

                onUpdate(log.id, updatedLog);
                setIsUpdateMode(false);
                setUpdateContent('');
            };

            const handleUpdateMainDetail = () => {
                onUpdate(log.id, { impact: mainDetail });
                setIsEditingMainDetail(false);
            };

            const handleDeleteUpdate = (indexToRemove) => {
                if (!confirm("Are you sure you want to delete this update?")) return;
                const newUpdates = (log.updates || []).filter((_, idx) => idx !== indexToRemove);
                onUpdate(log.id, { updates: newUpdates });
            };

            const setToday = () => {
                setUpdateDate(new Date().toISOString().split('T')[0]);
            };

            const handleToggleComplete = (e) => {
                e.stopPropagation();
                onUpdate(log.id, { status: log.status === 'Done' ? 'Open' : 'Done' });
            };

            const handleLineOA = async (e) => {
                e.stopPropagation();
                let apiUrl = localStorage.getItem('vercelApiUrl');

                // Check specifically for send-line endpoint to avoid confusion with previous teams url
                if (!apiUrl || !apiUrl.includes('send-line')) {
                    apiUrl = prompt("Enter Vercel API URL for Line (e.g., .../api/send-line):", apiUrl || "");
                    if (apiUrl) localStorage.setItem('vercelApiUrl', apiUrl);
                    else return;
                }

                if (!confirm(`Send Flex Message to Line OA?\nTask: ${log.title}`)) return;

                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: log.title,
                            category: log.category,
                            priority: log.priority,
                            app: log.application,
                            impact: log.impact
                        })
                    });

                    if (response.ok) {
                        alert('✅ Sent to Line OA!');
                    } else {
                        const err = await response.json().catch(() => ({}));
                        throw new Error(err.error || response.statusText);
                    }
                } catch (err) {
                    alert('❌ Error: ' + err.message);
                    if (confirm("Reset API URL?")) localStorage.removeItem('vercelApiUrl');
                }
            };

            const handleLineShare = (e) => {
                e.stopPropagation();
                // 1. Emojis per priority
                const emojis = { 'P1': '🚨', 'P2': '⚠️', 'P3': '📝', 'P4': '📌', 'P5': '💤' };
                const icon = emojis[log.priority] || '📢';

                // 2. Get latest info
                const latestContent = (log.updates && log.updates.length > 0) ? log.updates[0].content : log.impact;
                const displayDate = log.lastUpdateDate ? new Date(log.lastUpdateDate).toLocaleDateString() : 'New Task';

                // 3. Build Message
                const message = `${icon} *WorkPulse Update*\n\n` +
                    `📌 *Task:* ${log.title}\n` +
                    `📊 *Status:* ${log.priority} | ${log.category}\n` +
                    `📅 *Update:* ${displayDate} (via ${log.updateChannel})\n` +
                    `------------------\n` +
                    `${latestContent || 'No details provided.'}\n` +
                    `#WorkPulse365 #DHL`;

                // 4. Send to Line
                const url = `https://line.me/R/msg/text/?${encodeURIComponent(message)}`;
                window.open(url, '_blank');
            };



            // --- Render: Update Form Mode ---
            if (isUpdateMode) {
                return (
                    <div className="bg-white p-4 rounded-xl shadow-md border-2 border-dhl-yellow space-y-4">
                        <div className="flex justify-between items-center">
                            <span className="text-xs text-dhl-red font-bold uppercase">Update Log</span>
                            <button onClick={() => setIsUpdateMode(false)} className="text-xs text-slate-400 hover:text-red-500">Cancel</button>
                        </div>

                        {/* SECTION 1: EDIT INFO */}
                        <div className="border border-slate-200 rounded-lg p-3 bg-slate-50 relative">
                            <h5 className="text-[10px] font-bold text-slate-400 uppercase mb-2">1. Edit Task Info</h5>
                            <div className="grid grid-cols-2 gap-3 mb-3">
                                <div className="col-span-2 space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase">Title</label>
                                    <input
                                        className="w-full p-2 bg-white border rounded font-semibold text-slate-800 text-sm outline-none focus:border-dhl-red"
                                        value={editTitle} onChange={e => setEditTitle(e.target.value)}
                                    />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase">Category</label>
                                    <select
                                        value={editCategory} onChange={handleEditCategoryChange}
                                        className="w-full p-2 bg-white border rounded text-xs font-bold outline-none">
                                        {Object.keys(CATEGORY_MAPPING).map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase">Application</label>
                                    <select
                                        value={editApp} onChange={e => setEditApp(e.target.value)}
                                        className="w-full p-2 bg-white border rounded text-xs font-bold outline-none">
                                        {CATEGORY_MAPPING[editCategory].map(a => <option key={a} value={a}>{a}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase">Priority</label>
                                    <select
                                        value={editPriority} onChange={e => setEditPriority(e.target.value)}
                                        className="w-full p-2 bg-white border rounded text-xs font-bold outline-none">
                                        {Object.entries(PRIORITIES).map(([k, v]) => <option key={k} value={k}>{k}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase">Target</label>
                                    <input
                                        type="month"
                                        value={editTargetMonth} onChange={e => setEditTargetMonth(e.target.value)}
                                        className="w-full p-2 bg-white border rounded text-xs font-bold outline-none"
                                    />
                                </div>
                                <div className="col-span-2 space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase">Customer</label>
                                    <input
                                        value={editCustomer} onChange={e => setEditCustomer(e.target.value)}
                                        className="w-full p-2 bg-white border rounded text-xs font-bold outline-none"
                                        placeholder="Customer name (Optional)"
                                    />
                                </div>
                            </div>
                            <button onClick={handleSaveMetadata} className="w-full py-1.5 bg-slate-800 text-white rounded text-xs font-bold hover:bg-black transition-colors">
                                Save Info Changes
                            </button>
                        </div>

                        {/* SECTION 2: ADD UPDATE */}
                        <div className="border border-yellow-200 rounded-lg p-3 bg-yellow-50/50 relative">
                            <h5 className="text-[10px] font-bold text-dhl-red uppercase mb-2">2. Add Progress Update</h5>

                            <div className="flex gap-2 mb-2">
                                <input type="date" className="flex-1 p-2 bg-white border rounded text-sm outline-none"
                                    value={updateDate} onChange={e => setUpdateDate(e.target.value)} />
                                <button type="button" onClick={setToday} className="bg-white border px-3 rounded text-xs font-bold hover:text-dhl-red">Today</button>
                            </div>

                            <div className="flex flex-wrap gap-2 items-center mb-2">
                                <span className="text-xs text-slate-500">Via:</span>
                                {['Chat', 'Phone', 'Email', 'Facing', 'App'].map(ch => (
                                    <button key={ch} onClick={() => setUpdateChannel(ch)}
                                        className={`px-3 py-1 rounded-full text-xs font-bold border ${updateChannel === ch ? 'bg-slate-800 text-white' : 'bg-white text-slate-400'}`}>
                                        {ch}
                                    </button>
                                ))}
                            </div>

                            <textarea
                                className="w-full p-2 bg-white border rounded text-sm min-h-[80px] outline-none mb-2"
                                placeholder="What happened in this update?"
                                value={updateContent} onChange={e => setUpdateContent(e.target.value)}
                            />

                            <button onClick={handleAddProgress} disabled={!updateContent.trim() || !updateChannel} className="w-full py-1.5 bg-dhl-red text-white rounded text-xs font-bold hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed">
                                Post Update
                            </button>
                        </div>
                    </div>
                );
            }

            // --- Render: Main Card ---
            return (
                <div className={`rounded-xl shadow-sm border group transition-all overflow-hidden ${log.status === 'Done' ? 'bg-green-50/50 border-green-200 opacity-75' : 'bg-white border-slate-100'}`}>
                    {/* Card Header Content */}
                    <div className="p-4 relative hover:bg-slate-50/50 transition-colors cursor-pointer" onClick={() => setShowDetail(!showDetail)}>
                        <div className="flex justify-between items-start">
                            <div className="flex-1">
                                {/* Badges */}
                                <div className="flex flex-wrap items-center gap-2 text-xs font-semibold text-dhl-red uppercase mb-2">
                                    {log.priority && PRIORITIES[log.priority] && (
                                        <span className={`px-2 py-0.5 rounded-full text-[10px] ${PRIORITIES[log.priority].color}`}>{log.priority}</span>
                                    )}
                                    <span className="bg-red-50 px-2 py-0.5 rounded-full">{log.category}</span>
                                    {log.application && <span className="bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full border">{log.application}</span>}
                                </div>

                                {/* Title */}
                                <h4 className="text-slate-800 font-bold text-lg leading-snug mb-1">{log.title}</h4>
                                {log.customer && <div className="text-xs font-bold text-slate-400 flex items-center gap-1 mb-2"><span className="w-1 h-1 bg-slate-400 rounded-full"></span> {log.customer}</div>}

                                {/* Latest Update & Countdown */}
                                <div className="mt-3 flex flex-wrap items-center gap-2">
                                    {log.lastUpdateDate && (
                                        <div className="flex items-center gap-2 text-xs text-slate-600 bg-yellow-50 p-2 rounded border border-yellow-100">
                                            <span className="font-bold text-dhl-red">LATEST:</span>
                                            <span className="flex items-center gap-1">
                                                {new Date(log.lastUpdateDate).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}
                                                <span className="opacity-50 mx-1">|</span>
                                                <span className={`w-2 h-2 rounded-full ${log.updateChannel === 'Email' ? 'bg-blue-400' : log.updateChannel === 'Phone' ? 'bg-green-400' : 'bg-purple-400'}`}></span> {log.updateChannel}
                                            </span>
                                        </div>
                                    )}

                                    {/* Days Remaining Countdown */}
                                    {log.status !== 'Done' && (
                                        (() => {
                                            const lastActionDate = log.lastUpdateDate || log.date;
                                            const pDays = PRIORITIES[log.priority]?.days || 30;
                                            const dueDate = addBusinessDays(lastActionDate, pDays);
                                            const daysLeft = getBusinessDaysLeft(dueDate);

                                            let colorClass = 'bg-green-100 text-green-700 border-green-200';
                                            if (daysLeft < 0) colorClass = 'bg-red-100 text-red-700 border-red-200 animate-pulse';
                                            else if (daysLeft <= 1) colorClass = 'bg-red-50 text-red-600 border-red-100';
                                            else if (daysLeft <= 2) colorClass = 'bg-orange-100 text-orange-700 border-orange-200';

                                            return (
                                                <div className={`text-[10px] font-bold px-2 py-1 rounded border flex items-center gap-1 ${colorClass}`}>
                                                    <span className="text-sm">⏳</span>
                                                    {daysLeft < 0 ? `${Math.abs(daysLeft)} Days Overdue` : `${daysLeft} Days Left`}
                                                </div>
                                            );
                                        })()
                                    )}
                                </div>
                            </div>

                            {/* Actions */}
                            <div className="flex flex-col gap-1 ml-2" onClick={e => e.stopPropagation()}>
                                <button onClick={handleToggleComplete} className={`p-2 rounded-full transition-colors ${log.status === 'Done' ? 'text-green-600 bg-green-100 hover:bg-green-200' : 'text-slate-300 hover:text-green-500 hover:bg-green-50'}`} title={log.status === 'Done' ? "Mark as Open" : "Mark as Done"}>
                                    <CheckCircle size={18} />
                                </button>
                                <button onClick={() => setIsUpdateMode(true)} className="text-slate-300 hover:text-dhl-red p-2 hover:bg-red-50 rounded-full transition-colors" title="Update Status">
                                    <Edit2 size={18} />
                                </button>
                                <button onClick={handleLineShare} className="text-slate-300 hover:text-[#06c755] p-2 hover:bg-green-50 rounded-full transition-colors" title="Share directly to Line App">
                                    <Share2 size={18} />
                                </button>
                                <button onClick={handleLineOA} className="text-slate-300 hover:text-[#06c755] p-2 hover:bg-green-50 rounded-full transition-colors" title="Send to Line OA">
                                    <MessageSquare size={18} />
                                </button>
                                <button onClick={() => onDelete(log.id)} className="text-slate-300 hover:text-red-500 p-2 hover:bg-red-50 rounded-full transition-colors" title="Delete">
                                    <Trash2 size={18} />
                                </button>
                            </div>
                        </div>

                        {/* Expand Chevron */}
                        <div className="flex justify-center mt-2 -mb-2 opacity-50">
                            {showDetail ? <div className="w-12 h-1 bg-slate-200 rounded-full" /> : <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Details</div>}
                        </div>
                    </div>

                    {/* Expandable Detail Section */}
                    {showDetail && (
                        <div className="bg-slate-50 border-t border-slate-200 p-4 space-y-6 animate-in slide-in-from-top-2">
                            {/* 1. Main Task Detail */}
                            <div>
                                <div className="flex justify-between items-center mb-2">
                                    <h5 className="text-xs font-bold text-slate-400 uppercase">Task Detail</h5>
                                    {!isEditingMainDetail ? (
                                        <button onClick={() => setIsEditingMainDetail(true)} className="text-xs text-dhl-red hover:underline font-bold">Edit</button>
                                    ) : (
                                        <div className="flex gap-2">
                                            <button onClick={() => setIsEditingMainDetail(false)} className="text-xs text-slate-400">Cancel</button>
                                            <button onClick={handleUpdateMainDetail} className="text-xs text-dhl-red font-bold">Save</button>
                                        </div>
                                    )}
                                </div>
                                {isEditingMainDetail ? (
                                    <textarea
                                        className="w-full p-2 bg-white border rounded text-sm min-h-[100px] outline-none shadow-inner"
                                        value={mainDetail} onChange={e => setMainDetail(e.target.value)}
                                    />
                                ) : (
                                    <p className="text-sm text-slate-700 whitespace-pre-line bg-white p-3 rounded border border-slate-200 shadow-sm">
                                        {log.impact || <span className="text-slate-400 italic">No details provided.</span>}
                                    </p>
                                )}
                            </div>

                            {/* 2. Update Log History */}
                            <div>
                                <h5 className="text-xs font-bold text-slate-400 uppercase mb-3">Update History</h5>
                                <div className="space-y-3 pl-2 border-l-2 border-slate-200 ml-1">
                                    {log.updates && log.updates.length > 0 ? (
                                        log.updates.map((u, idx) => (
                                            <div key={idx} className="relative pl-4 group">
                                                <div className="absolute -left-[21px] top-1 w-3 h-3 rounded-full bg-slate-300 border-2 border-slate-50"></div>
                                                <div className="text-xs text-slate-500 font-bold flex justify-between items-center mb-1">
                                                    <div className="flex gap-2">
                                                        {new Date(u.date).toLocaleDateString()}
                                                        <span className={`px-1.5 rounded text-[10px] text-white ${u.channel === 'Email' ? 'bg-blue-400' : u.channel === 'Phone' ? 'bg-green-400' : 'bg-purple-400'}`}>{u.channel}</span>
                                                    </div>
                                                    <button onClick={() => handleDeleteUpdate(idx)} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-opacity" title="Delete Update">
                                                        <X size={14} />
                                                    </button>
                                                </div>
                                                <p className="text-sm text-slate-700 bg-white p-2 rounded shadow-sm border border-slate-100">
                                                    {u.content || <span className="opacity-50">No content</span>}
                                                </p>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="pl-4 text-xs text-slate-400 italic">No update history yet.</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Timeline = ({ logs, onDelete, onUpdate, queryLimit, onLoadAll }) => {
            const [filterApp, setFilterApp] = useState('All');
            const [sortBy, setSortBy] = useState('updated'); // updated | created
            const [statusTab, setStatusTab] = useState('ongoing');


            const filteredLogs = useMemo(() => {
                let result = [...logs];

                // 1. Status Filter
                if (statusTab === 'ongoing') {
                    result = result.filter(log => log.status !== 'Done');
                } else {
                    result = result.filter(log => log.status === 'Done');
                }

                // 2. App Filter
                if (filterApp !== 'All') {
                    result = result.filter(log => log.application === filterApp);
                }

                // 3. Sort
                if (sortBy === 'updated') {
                    result.sort((a, b) => {
                        const dateA = a.lastUpdateDate ? new Date(a.lastUpdateDate) : new Date(a.date);
                        const dateB = b.lastUpdateDate ? new Date(b.lastUpdateDate) : new Date(b.date);
                        return dateB - dateA; // Descending
                    });
                } else {
                    // Sort by Created Date (or 'date' field)
                    result.sort((a, b) => new Date(b.date) - new Date(a.date));
                }
                return result;
            }, [logs, filterApp, sortBy, statusTab]);

            const groupedLogs = useMemo(() => {
                const groups = {};
                filteredLogs.forEach(log => {
                    // Grouping Logic:
                    // If sorting by Updated -> Group by "Last Updated: <Date>"
                    // If sorting by Created -> Group by Month
                    let groupKey;
                    if (sortBy === 'updated') {
                        const d = log.lastUpdateDate ? new Date(log.lastUpdateDate) : new Date(log.date);
                        // Check if today
                        const today = new Date();
                        if (d.toDateString() === today.toDateString()) {
                            groupKey = 'Today';
                        } else {
                            groupKey = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        }
                    } else {
                        groupKey = new Date(log.date).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    }

                    if (!groups[groupKey]) groups[groupKey] = [];
                    groups[groupKey].push(log);
                });
                return Object.entries(groups); // Already sorted by nature of processedLogs order mostly, but we trust the list order
            }, [filteredLogs, sortBy]);

            const EmptyState = () => (
                <div className="text-center py-12 flex flex-col items-center opacity-50">
                    <LayoutList size={48} className="mb-2 text-slate-300" />
                    <p className="text-slate-400">No {statusTab} logs found.</p>
                </div>
            );

            return (
                <div className="space-y-4 pb-24">
                    {/* Status Tabs */}
                    <div className="bg-slate-200 p-1 rounded-lg flex">
                        <button
                            onClick={() => setStatusTab('ongoing')}
                            className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${statusTab === 'ongoing' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            Ongoing
                        </button>
                        <button
                            onClick={() => setStatusTab('complete')}
                            className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${statusTab === 'complete' ? 'bg-white text-green-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            Complete
                        </button>
                    </div>

                    {/* Controls Header */}
                    <div className="sticky top-[72px] z-30 bg-slate-100/95 backdrop-blur py-2 -mx-4 px-4 border-b border-slate-200">
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider">
                                {filterApp === 'All' ? 'Timeline' : `${filterApp} Logs`}
                            </h3>
                            <button
                                onClick={() => setSortBy(sortBy === 'updated' ? 'created' : 'updated')}
                                className="text-xs flex items-center gap-1 font-bold text-dhl-red hover:bg-red-50 px-2 py-1 rounded transition-colors"
                            >
                                <span className="text-slate-400 font-normal text-[10px]">Sort by:</span>
                                {sortBy === 'updated' ? 'Last Updated' : 'Date Created'}
                            </button>
                        </div>

                        {/* Filter Chips */}
                        <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                            {ALL_APPS.map(app => (
                                <button
                                    key={app}
                                    onClick={() => setFilterApp(app)}
                                    className={`px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all border ${filterApp === app
                                        ? 'bg-slate-800 text-white border-slate-800 shadow-md'
                                        : 'bg-white text-slate-500 border-slate-200 hover:border-slate-300'
                                        }`}
                                >
                                    {app}
                                </button>
                            ))}
                        </div>
                    </div>

                    {groupedLogs.length === 0 ? <EmptyState /> : (
                        <div className="space-y-6">
                            {groupedLogs.map(([group, groupLogs]) => (
                                <div key={group} className="animate-in fade-in duration-500">
                                    <div className="flex items-center gap-2 mb-3">
                                        <div className="h-[1px] flex-1 bg-slate-200"></div>
                                        <h3 className="text-xs font-bold text-slate-400 uppercase bg-slate-100 px-2">{group}</h3>
                                        <div className="h-[1px] flex-1 bg-slate-200"></div>
                                    </div>
                                    <div className="space-y-3">
                                        {groupLogs.map(log => (
                                            <LogCard key={log.id} log={log} onDelete={onDelete} onUpdate={onUpdate} />
                                        ))}
                                    </div>
                                </div>
                            ))}

                            {/* Load All Button */}
                            {queryLimit && (
                                <div className="pt-4 text-center">
                                    <div className="text-xs text-slate-400 mb-2">Showing limited recent items</div>
                                    <button
                                        onClick={onLoadAll}
                                        className="bg-slate-100 text-slate-600 px-6 py-2 rounded-full text-xs font-bold hover:bg-slate-200 transition-colors shadow-sm border border-slate-200"
                                    >
                                        Load Full History
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const Dashboard = ({ logs }) => {
            const stats = useMemo(() => {
                const total = logs.length;
                const monthlyData = {};
                const categoryData = {};
                const priorityData = { 'P1': 0, 'P2': 0, 'P3': 0, 'P4': 0, 'P5': 0 };

                logs.forEach(log => {
                    // Monthly
                    const d = new Date(log.date);
                    const mKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; // YYYY-MM for sorting
                    monthlyData[mKey] = (monthlyData[mKey] || 0) + 1;

                    // Category
                    const cat = log.category || 'Uncategorized';
                    categoryData[cat] = (categoryData[cat] || 0) + 1;

                    // Priority
                    const p = log.priority || 'P3';
                    if (priorityData[p] !== undefined) priorityData[p]++;
                });

                // Format for Recharts
                const monthlyChart = Object.entries(monthlyData)
                    .sort((a, b) => a[0].localeCompare(b[0]))
                    .map(([key, value]) => {
                        const [y, m] = key.split('-');
                        const dateObj = new Date(y, m - 1);
                        return { name: dateObj.toLocaleString('default', { month: 'short' }), value };
                    });

                const categoryChart = Object.entries(categoryData)
                    .map(([name, value]) => ({ name, value }))
                    .sort((a, b) => b.value - a.value); // Descending

                return { total, monthly: monthlyChart, category: categoryChart, priority: priorityData };
            }, [logs]);

            const COLORS = ['#D40511', '#FFCC00', '#3C3C3C', '#AAAAAA', '#D40511'];
            const PRIORITY_CONFIG = {
                'P1': { label: 'P1 - Critical', color: 'bg-red-600', width: 'w-full' },
                'P2': { label: 'P2 - High', color: 'bg-orange-500', width: 'w-10/12' },
                'P3': { label: 'P3 - Medium', color: 'bg-yellow-500', width: 'w-8/12' },
                'P4': { label: 'P4 - Low', color: 'bg-blue-500', width: 'w-6/12' },
                'P5': { label: 'P5 - Trivial', color: 'bg-slate-400', width: 'w-4/12' }
            };

            return (
                <div className="space-y-6 pb-24 animate-in fade-in duration-300">
                    {/* Summary Cards */}
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-gradient-to-br from-dhl-red to-red-800 rounded-xl p-4 text-white shadow-md relative overflow-hidden">
                            <Award className="absolute right-2 top-2 opacity-20" size={48} />
                            <div className="text-xs font-bold uppercase opacity-80 mb-1">Total Logs</div>
                            <div className="text-4xl font-black tracking-tight">{stats.total}</div>
                        </div>
                        <div className="bg-white rounded-xl p-4 shadow-sm border border-slate-100 relative overflow-hidden">
                            <TrendingUp className="absolute right-2 top-2 text-slate-100" size={48} />
                            <div className="text-xs font-bold uppercase text-slate-400 mb-1">Avg / Month</div>
                            <div className="text-4xl font-black text-slate-800">
                                {stats.monthly.length ? Math.round(stats.total / stats.monthly.length) : 0}
                            </div>
                        </div>
                    </div>

                    {/* Volume Chart */}
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                        <h3 className="text-xs font-bold text-slate-400 uppercase mb-4 flex items-center gap-2">
                            <Calendar size={14} /> Volume by Month
                        </h3>
                        <div className="h-48">
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={stats.monthly}>
                                    <XAxis dataKey="name" tick={{ fontSize: 10, fill: '#64748b' }} axisLine={false} tickLine={false} />
                                    <ReTooltip
                                        contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}
                                        cursor={{ fill: '#f1f5f9' }}
                                    />
                                    <Bar dataKey="value" fill="#FFCC00" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    {/* Priority Mix */}
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                        <h3 className="text-xs font-bold text-slate-400 uppercase mb-4">Tasks by Priority</h3>
                        <div className="space-y-3">
                            {['P1', 'P2', 'P3', 'P4', 'P5'].map(p => {
                                const count = stats.priority[p];
                                const max = Math.max(...Object.values(stats.priority)) || 1;
                                const percent = (count / max) * 100;
                                return (
                                    <div key={p} className="flex items-center gap-3">
                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-xs font-bold text-white shrink-0 ${PRIORITY_CONFIG[p].color}`}>
                                            {p}
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex justify-between items-end mb-1">
                                                <span className="text-xs font-bold text-slate-700">{PRIORITY_CONFIG[p].label}</span>
                                                <span className="text-xs font-bold text-slate-900">{count}</span>
                                            </div>
                                            <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                                                <div
                                                    className={`h-full rounded-full transition-all duration-1000 ${PRIORITY_CONFIG[p].color}`}
                                                    style={{ width: `${percent}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Category Mix */}
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                        <h3 className="text-xs font-bold text-slate-400 uppercase mb-2 flex items-center gap-2">
                            <ChartIcon size={14} /> Category Mix
                        </h3>
                        <div className="flex items-center">
                            <div className="h-48 w-1/2">
                                <ResponsiveContainer width="100%" height="100%">
                                    <PieChart>
                                        <Pie
                                            data={stats.category}
                                            innerRadius={35}
                                            outerRadius={60}
                                            paddingAngle={4}
                                            dataKey="value"
                                        >
                                            {stats.category.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} stroke="none" />
                                            ))}
                                        </Pie>
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="w-1/2 pl-4 space-y-1">
                                {stats.category.map((entry, index) => (
                                    <div key={index} className="flex items-center gap-2 text-xs">
                                        <div className="w-2 h-2 rounded-full" style={{ backgroundColor: COLORS[index % COLORS.length] }}></div>
                                        <span className="flex-1 text-slate-600 truncate">{entry.name}</span>
                                        <span className="font-bold text-slate-800">{entry.value}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Profile = ({ user, onLogout }) => {
            const [token, setToken] = useState(localStorage.getItem('lineNotifyToken') || '');
            const [status, setStatus] = useState('');

            const saveToken = () => {
                localStorage.setItem('lineNotifyToken', token);
                setStatus('Saved! ✅');
                setTimeout(() => setStatus(''), 2000);
            };

            return (
                <div className="space-y-6 animate-in fade-in">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 text-center">
                        <div className="w-20 h-20 bg-slate-100 rounded-full mx-auto mb-3 flex items-center justify-center text-4xl">👤</div>
                        <h2 className="text-xl font-bold text-slate-800">User Profile</h2>
                        <p className="text-slate-500 text-sm">ID: {user?.uid?.slice(0, 6)}...</p>
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <div className="flex items-center gap-2 mb-4 text-dhl-red">
                            <span />
                            <h3 className="font-bold uppercase text-sm">Integrations</h3>
                        </div>

                        <div className="space-y-3">
                            <label className="text-xs font-bold text-slate-400 uppercase block">Line Notify Token</label>
                            <input
                                type="password"
                                className="w-full p-3 bg-slate-50 border rounded-lg outline-none text-sm font-mono"
                                placeholder="Paste token here..."
                                value={token}
                                onChange={e => setToken(e.target.value)}
                            />
                            <div className="flex justify-between items-center">
                                <a href="https://notify-bot.line.me/my/" target="_blank" className="text-xs text-blue-500 underline">Get Token Here</a>
                                <button onClick={saveToken} className="bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-black transition-colors">
                                    Save Token
                                </button>
                            </div>
                            {status && <p className="text-green-600 text-xs font-bold text-right transition-opacity">{status}</p>}
                        </div>

                        <div className="mt-6 pt-6 border-t border-slate-100">
                            <p className="text-xs text-slate-400 mb-2">How to use:</p>
                            <ol className="text-xs text-slate-600 space-y-1 list-decimal list-inside">
                                <li>Go to Line Notify & Login.</li>
                                <li>"Generate Token" {'>'} Select Chat.</li>
                                <li>Paste Token above & Save.</li>
                                <li>Invite <b>Line Notify</b> bot to that chat.</li>
                            </ol>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [logs, setLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('home');
            const [loading, setLoading] = useState(true);
            const [authLoading, setAuthLoading] = useState(true);
            const [error, setError] = useState('');
            const [queryLimit, setQueryLimit] = useState(10); // Limit initial reads

            const handleLogin = async () => {
                try {
                    const provider = new GoogleAuthProvider();
                    await signInWithPopup(auth, provider);
                } catch (e) {
                    console.error(e);
                    alert("Login failed: " + e.message);
                }
            };

            const handleLogout = () => signOut(auth);

            // 1. Auth Listener
            useEffect(() => {
                if (!auth) {
                    setError("Firebase config missing");
                    setAuthLoading(false);
                    return;
                }
                const unsubscribe = onAuthStateChanged(auth, u => {
                    setUser(u);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. Data Listener (Depends on User & Limit)
            useEffect(() => {
                if (!user) {
                    setLogs([]);
                    return;
                }

                setLoading(true);
                let q = query(
                    collection(db, 'artifacts', 'workpulse-365', 'users', user.uid, 'worklogs'),
                    orderBy('date', 'desc')
                );

                if (queryLimit) {
                    q = query(q, limit(queryLimit));
                }

                const unsubLogs = onSnapshot(q, s => {
                    setLogs(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });
                return () => unsubLogs();
            }, [user, queryLimit]);

            const handleAdd = async (data) => {
                if (user) await addDoc(collection(db, 'artifacts', 'workpulse-365', 'users', user.uid, 'worklogs'), { ...data, userId: user.uid });
            };

            const handleUpdate = async (id, data) => {
                if (user) await updateDoc(doc(db, 'artifacts', 'workpulse-365', 'users', user.uid, 'worklogs', id), data);
            };

            const handleDelete = async (id) => {
                if (user) await deleteDoc(doc(db, 'artifacts', 'workpulse-365', 'users', user.uid, 'worklogs', id));
            };

            const upcomingLogs = useMemo(() => {
                return logs.filter(l => ['P1', 'P2', 'P3'].includes(l.priority) && l.status !== 'Done').sort((a, b) => a.priority.localeCompare(b.priority));
            }, [logs]);

            if (authLoading) {
                return <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50"><Loader2 className="animate-spin text-dhl-red mb-4" size={48} /><p className="text-slate-400 text-sm font-bold animate-pulse">Loading WorkPulse...</p></div>;
            }

            // Login Screen if no user
            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-100 flex flex-col">
                        <Header user={null} />
                        <div className="flex-1 flex flex-col items-center justify-center p-6 animate-in fade-in slide-in-from-bottom-8 duration-700">
                            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center space-y-8 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-dhl-yellow"></div>
                                <div className="w-24 h-24 bg-gradient-to-br from-dhl-yellow to-yellow-400 rounded-full mx-auto flex items-center justify-center text-dhl-red shadow-lg transform -rotate-3 hover:rotate-3 transition-transform duration-500">
                                    <Award size={48} />
                                </div>
                                <div>
                                    <h2 className="text-3xl font-black text-slate-800 mb-3 tracking-tight">Welcome Back!</h2>
                                    <p className="text-slate-500 leading-relaxed text-sm">Sign in to track your work, generate reports, and boost productivity with DHL WorkPulse.</p>
                                </div>
                                <button onClick={handleLogin} className="w-full bg-white border-2 border-slate-200 hover:border-dhl-red hover:bg-red-50 text-slate-700 font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all group shadow-sm hover:shadow-md">
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6" alt="Google" />
                                    <span className="group-hover:text-dhl-red text-lg">Sign in with Google</span>
                                </button>
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Secure Login via Google</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // View Components to keep main return clean
            const NavButtons = ({ vertical = false }) => (
                <>
                    <button onClick={() => setActiveTab('home')} className={`flex ${vertical ? 'flex-row gap-3 px-4 py-3 w-full hover:bg-slate-100' : 'flex-col justify-center w-full p-2'} items-center rounded-lg transition-all ${activeTab === 'home' ? 'text-dhl-red bg-red-50/50' : 'text-slate-400'}`}>
                        <Menu size={24} /> <span className={`font-bold ${vertical ? 'text-sm' : 'text-xs mt-1'}`}>Home</span>
                    </button>
                    <button onClick={() => setActiveTab('timeline')} className={`flex ${vertical ? 'flex-row gap-3 px-4 py-3 w-full hover:bg-slate-100' : 'flex-col justify-center w-full p-2'} items-center rounded-lg transition-all ${activeTab === 'timeline' ? 'text-dhl-red bg-red-50/50' : 'text-slate-400'}`}>
                        <LayoutList size={24} /> <span className={`font-bold ${vertical ? 'text-sm' : 'text-xs mt-1'}`}>Timeline</span>
                    </button>
                    <button onClick={() => setActiveTab('stats')} className={`flex ${vertical ? 'flex-row gap-3 px-4 py-3 w-full hover:bg-slate-100' : 'flex-col justify-center w-full p-2'} items-center rounded-lg transition-all ${activeTab === 'stats' ? 'text-dhl-red bg-red-50/50' : 'text-slate-400'}`}>
                        <ChartIcon size={24} /> <span className={`font-bold ${vertical ? 'text-sm' : 'text-xs mt-1'}`}>Dashboard</span>
                    </button>
                </>
            );

            // Main App
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <Header user={user} onLogout={handleLogout} />

                    <div className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 pb-24 md:pb-6">

                        {/* Desktop Layout Grid */}
                        <div className="md:grid md:grid-cols-[240px_1fr] gap-8 items-start h-full">

                            {/* Desktop Sidebar */}
                            <aside className="hidden md:block bg-white rounded-xl shadow-sm border border-slate-100 p-4 sticky top-24">
                                <nav className="space-y-2">
                                    <div className="px-4 py-2 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Menu</div>
                                    <NavButtons vertical={true} />
                                </nav>
                                <div className="mt-8 border-t pt-4 px-4">
                                    <div className="text-xs text-slate-400">
                                        Logged in as <br /> <b className="text-slate-600">{user.displayName}</b>
                                    </div>
                                </div>
                            </aside>

                            {/* Main Content Area */}
                            <main className="w-full">
                                {loading && <div className="text-center py-20"><Loader2 className="animate-spin mx-auto text-dhl-red" size={32} /><p className="text-slate-400 mt-2 text-sm">Syncing...</p></div>}

                                {!loading && error && (
                                    <div className="bg-red-50 text-red-800 p-4 rounded-xl border border-red-100 mb-6 flex items-center gap-3">
                                        <div className="bg-red-100 p-2 rounded-full"><LogOut size={16} /></div>
                                        <div><b>Connection Error:</b> {error}</div>
                                    </div>
                                )}

                                {!loading && !error && (
                                    <div className="animate-in fade-in slide-in-from-bottom-2 duration-500">
                                        {activeTab === 'home' && (
                                            <div className="lg:grid lg:grid-cols-12 gap-8 items-start">
                                                {/* Left Col: Quick Log */}
                                                <div className="lg:col-span-5 xl:col-span-4 lg:sticky lg:top-24 relative z-20 mb-8 lg:mb-0">
                                                    <QuickLog onAddLog={handleAdd} />
                                                </div>

                                                {/* Right Col: Timeline/Tasks */}
                                                <div className="lg:col-span-7 xl:col-span-8 relative z-10">
                                                    <div className="flex items-center justify-between mb-6">
                                                        <div className="flex items-center gap-3">
                                                            <div className="p-2 bg-red-100 rounded-lg text-dhl-red"><TrendingUp size={20} /></div>
                                                            <div>
                                                                <h3 className="text-xl font-bold text-slate-800 leading-none">Upcoming & Critical</h3>
                                                                <p className="text-xs text-slate-500 font-medium mt-1">High priority tasks needing attention</p>
                                                            </div>
                                                        </div>
                                                        <span className="bg-dhl-red text-white px-3 py-1 rounded-full text-sm font-bold shadow-sm">{upcomingLogs.length}</span>
                                                    </div>

                                                    <div className="space-y-4">
                                                        {upcomingLogs.length === 0 ?
                                                            <div className="bg-white rounded-xl p-8 text-center border border-slate-100 border-dashed">
                                                                <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3 text-slate-300">
                                                                    <CheckCircle size={32} />
                                                                </div>
                                                                <p className="text-slate-500 font-medium">No critical tasks pending.</p>
                                                                <p className="text-xs text-slate-400">Enjoy your coffee! ☕</p>
                                                            </div>
                                                            :
                                                            upcomingLogs.map(log => <LogCard key={log.id} log={log} onDelete={handleDelete} onUpdate={handleUpdate} />)
                                                        }
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        {activeTab === 'timeline' && <Timeline logs={logs} onDelete={handleDelete} onUpdate={handleUpdate} queryLimit={queryLimit} onLoadAll={() => setQueryLimit(null)} />}
                                        {activeTab === 'stats' && (
                                            <>
                                                {queryLimit && (
                                                    <div onClick={() => setQueryLimit(null)} className="bg-yellow-50 border border-yellow-200 p-2 mb-4 rounded-lg text-center cursor-pointer hover:bg-yellow-100 transition-colors">
                                                        <p className="text-xs text-yellow-700 font-bold flex items-center justify-center gap-2">
                                                            <TrendingUp size={14} /> Stats based on recent {queryLimit} items. Click to Load All.
                                                        </p>
                                                    </div>
                                                )}
                                                <Dashboard logs={logs} />
                                            </>
                                        )}
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>

                    {/* Mobile Bottom Nav */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-40 pb-safe">
                        <div className="flex justify-around p-2">
                            <NavButtons vertical={false} />
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
